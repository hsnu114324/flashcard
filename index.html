<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>德語 Flashcard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #fff;
      padding: 16px;
      padding-bottom: 100px;
    }

    .header {
      text-align: center;
      padding: 20px 0 10px;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(90deg, #f9d423, #ff4e50);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .progress-bar-container {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
      margin: 16px 0;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #f9d423, #ff4e50);
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .progress-text {
      text-align: center;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 16px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 24px 20px;
      margin-bottom: 20px;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .card.slide-in {
      animation: slideIn 0.4s ease forwards;
    }

    @keyframes slideIn {
      from { transform: translateX(60px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .question-number {
      display: inline-block;
      background: linear-gradient(135deg, #f9d423, #ff4e50);
      color: #1a1a2e;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    .question-text {
      font-size: 1.15rem;
      line-height: 1.7;
      font-weight: 500;
      margin-bottom: 12px;
      word-break: break-word;
    }

    .chinese-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
      font-size: 0.85rem;
      padding: 8px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-bottom: 6px;
      user-select: none;
      -webkit-user-select: none;
    }

    .chinese-toggle:hover {
      background: rgba(255,255,255,0.18);
    }

    .chinese-toggle .icon {
      font-size: 1rem;
      transition: transform 0.3s ease;
    }

    .chinese-toggle.open .icon {
      transform: rotate(90deg);
    }

    .chinese-text {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.35s ease, opacity 0.35s ease;
      opacity: 0;
      padding: 0;
    }

    .chinese-text.show {
      max-height: 100px;
      opacity: 1;
      padding: 10px 0 4px;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 18px;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 500;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 14px;
      color: #fff;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .option-btn:active {
      transform: scale(0.97);
    }

    .option-btn:hover {
      background: rgba(255,255,255,0.13);
      border-color: rgba(255,255,255,0.3);
    }

    .option-btn.correct {
      background: rgba(76, 217, 100, 0.2);
      border-color: #4cd964;
      color: #4cd964;
      animation: correctPulse 0.5s ease;
    }

    @keyframes correctPulse {
      0% { transform: scale(1); }
      30% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    .option-btn.wrong {
      animation: shakeOut 0.4s ease forwards;
    }

    @keyframes shakeOut {
      0% { transform: translateX(0); opacity: 1; }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-4px); opacity: 0.5; }
      100% { transform: translateX(0); opacity: 0; max-height: 0; padding: 0; margin: 0; border: 0; overflow: hidden; }
    }

    .option-btn.wrong {
      pointer-events: none;
    }

    .option-btn.disabled {
      pointer-events: none;
      opacity: 0.5;
    }

    .explanation-box {
      margin-top: 18px;
      background: rgba(76, 217, 100, 0.08);
      border: 1px solid rgba(76, 217, 100, 0.25);
      border-radius: 14px;
      padding: 18px;
      animation: fadeIn 0.4s ease forwards;
    }

    .explanation-box .label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #4cd964;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .explanation-box .text {
      font-size: 0.95rem;
      line-height: 1.7;
      color: rgba(255,255,255,0.85);
    }

    .next-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 16px;
      font-size: 1.05rem;
      font-weight: 600;
      color: #1a1a2e;
      background: linear-gradient(135deg, #f9d423, #ff4e50);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      animation: fadeIn 0.4s ease forwards;
      user-select: none;
      -webkit-user-select: none;
    }

    .next-btn:active {
      transform: scale(0.97);
    }

    .next-btn:hover {
      box-shadow: 0 6px 25px rgba(249, 212, 35, 0.3);
    }

    .score-card {
      text-align: center;
      padding: 40px 20px;
    }

    .score-card .emoji {
      font-size: 4rem;
      margin-bottom: 16px;
    }

    .score-card h2 {
      font-size: 1.5rem;
      margin-bottom: 8px;
    }

    .score-card .score {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(90deg, #f9d423, #ff4e50);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 16px 0;
    }

    .score-card .detail {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 24px;
    }

    .restart-btn {
      display: inline-block;
      padding: 14px 40px;
      font-size: 1rem;
      font-weight: 600;
      color: #1a1a2e;
      background: linear-gradient(135deg, #f9d423, #ff4e50);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.2s ease;
      user-select: none;
      -webkit-user-select: none;
    }

    .restart-btn:active {
      transform: scale(0.97);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🇩🇪 德語 Flashcard</h1>
  </div>

  <div class="progress-bar-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="progress-text" id="progressText"></div>

  <div id="cardArea"></div>

  <script>
    // ==================== 題庫 ====================
    const questions = [
      {
        id: 1,
        question: 'Es ______ viele alte Gemälde im Palastmuseum in Taipeh.',
        chinese: '故宮博物院裡有許多古畫。',
        options: ['haben', 'hat', 'geht', 'gibt'],
        labels: ['A', 'B', 'C', 'D'],
        correctIndex: 3,
        explanation: '這是德語最經典的存在句型「Es gibt + 賓語（Akkusativ）」，意思是「有……存在於某處」。'
      },
      {
        id: 2,
        question: 'Ich unterhalte ______ gern mit Ausländern.',
        chinese: '我很喜歡跟外國人聊天。',
        options: ['mich', 'sich', 'ihn', 'uns'],
        labels: ['A', 'B', 'C', 'D'],
        correctIndex: 0,
        explanation: '動詞 sich unterhalten 是反身動詞（reflexives Verb），意思是「聊天、交談」。第一人稱單數的反身代詞必須用 mich。'
      }
    ];

    // ==================== 狀態 ====================
    let currentIndex = 0;
    let correctOnFirst = 0; // 一次就答對的題數

    // ==================== 渲染 ====================
    function render() {
      const area = document.getElementById('cardArea');

      if (currentIndex >= questions.length) {
        renderScore();
        return;
      }

      const q = questions[currentIndex];
      updateProgress();

      area.innerHTML = `
        <div class="card slide-in">
          <div class="question-number">第 ${q.id} 題</div>
          <div class="question-text">${q.question}</div>

          <div class="chinese-toggle" id="chToggle" onclick="toggleChinese()">
            <span class="icon">▶</span> 顯示中文翻譯
          </div>
          <div class="chinese-text" id="chText">${q.chinese}</div>

          <div class="options-container" id="optionsContainer">
            ${q.options.map((opt, i) => `
              <button class="option-btn" data-index="${i}" onclick="selectOption(${i})">
                (${q.labels[i]}) ${opt}
              </button>
            `).join('')}
          </div>

          <div id="explanationArea"></div>
          <div id="nextArea"></div>
        </div>
      `;

      // 標記是否已經答錯過
      area._hadWrong = false;
    }

    function updateProgress() {
      const pct = (currentIndex / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = `${currentIndex} / ${questions.length}`;
    }

    // ==================== 互動 ====================
    function toggleChinese() {
      const toggle = document.getElementById('chToggle');
      const text = document.getElementById('chText');
      toggle.classList.toggle('open');
      text.classList.toggle('show');
      if (text.classList.contains('show')) {
        toggle.innerHTML = '<span class="icon">▶</span> 隱藏中文翻譯';
      } else {
        toggle.innerHTML = '<span class="icon">▶</span> 顯示中文翻譯';
      }
    }

    function selectOption(idx) {
      const q = questions[currentIndex];
      const area = document.getElementById('cardArea');
      const btn = document.querySelector(`.option-btn[data-index="${idx}"]`);

      if (idx === q.correctIndex) {
        // 正確
        btn.classList.add('correct');

        // 停用所有按鈕
        document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled'));

        if (!area._hadWrong) {
          correctOnFirst++;
        }

        // 顯示詳解
        document.getElementById('explanationArea').innerHTML = `
          <div class="explanation-box">
            <div class="label">✅ 詳細解釋</div>
            <div class="text">${q.explanation}</div>
          </div>
        `;

        // 下一題按鈕
        const isLast = currentIndex >= questions.length - 1;
        document.getElementById('nextArea').innerHTML = `
          <button class="next-btn" onclick="nextQuestion()">
            ${isLast ? '查看成績 🎉' : '下一題 →'}
          </button>
        `;
      } else {
        // 錯誤
        area._hadWrong = true;
        btn.classList.add('wrong');
        // 動畫結束後隱藏
        setTimeout(() => {
          btn.style.display = 'none';
        }, 420);
      }
    }

    function nextQuestion() {
      currentIndex++;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ==================== 成績 ====================
    function renderScore() {
      const total = questions.length;
      const pct = Math.round((correctOnFirst / total) * 100);
      let emoji = '🎉';
      if (pct < 50) emoji = '💪';
      else if (pct < 80) emoji = '👍';

      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = `${total} / ${total}`;

      document.getElementById('cardArea').innerHTML = `
        <div class="card slide-in score-card">
          <div class="emoji">${emoji}</div>
          <h2>測驗完成！</h2>
          <div class="score">${pct}%</div>
          <div class="detail">共 ${total} 題，一次答對 ${correctOnFirst} 題</div>
          <button class="restart-btn" onclick="restart()">再做一次 🔄</button>
        </div>
      `;
    }

    function restart() {
      currentIndex = 0;
      correctOnFirst = 0;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ==================== 啟動 ====================
    render();
  </script>
</body>
</html>
