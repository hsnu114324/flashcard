<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title> Flashcard </title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #fff;
      padding: 12px;
      overflow-x: hidden;
      touch-action: pan-y;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ===== Header ===== */
    .header {
      text-align: center;
      padding: 12px 0 8px;
    }
    .header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(90deg, #f9d423, #ff4e50);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .subtitle {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.45);
      margin-top: 4px;
    }

    /* ===== Questions Grid (2×2) ===== */
    .questions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 12px 0;
    }

    .question-card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 14px 12px;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .question-card.drag-over {
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 0 15px rgba(255,255,255,0.15);
    }

    .question-card.solved {
      border-color: #4cd964;
      box-shadow: 0 0 20px rgba(76, 217, 100, 0.4), 0 0 40px rgba(76, 217, 100, 0.15);
      animation: glowPulse 2s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(76,217,100,0.4), 0 0 40px rgba(76,217,100,0.15); }
      50%      { box-shadow: 0 0 28px rgba(76,217,100,0.6), 0 0 56px rgba(76,217,100,0.25); }
    }

    .q-number {
      display: inline-block;
      background: linear-gradient(135deg, #f9d423, #ff4e50);
      color: #1a1a2e;
      font-weight: 700;
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 8px;
      align-self: flex-start;
    }

    .q-text {
      font-size: 0.82rem;
      line-height: 1.55;
      font-weight: 500;
      flex: 1;
      word-break: break-word;
    }

    .q-chinese-toggle {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .q-chinese-toggle .arrow {
      transition: transform 0.3s;
      display: inline-block;
    }
    .q-chinese-toggle.open .arrow {
      transform: rotate(90deg);
    }

    .q-chinese {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease;
      opacity: 0;
    }
    .q-chinese.show {
      max-height: 60px;
      opacity: 1;
      margin-top: 4px;
    }

    .q-drop-zone {
      margin-top: 8px;
      min-height: 36px;
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.3);
      transition: border-color 0.2s, background 0.2s;
    }

    .question-card.drag-over .q-drop-zone {
      border-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.05);
    }

    .question-card.solved .q-drop-zone {
      border-style: solid;
      border-color: #4cd964;
      background: rgba(76,217,100,0.1);
      color: #4cd964;
      font-weight: 600;
      font-size: 0.78rem;
    }

    .q-explanation {
      margin-top: 8px;
      font-size: 0.68rem;
      line-height: 1.6;
      color: rgba(255,255,255,0.8);
      background: rgba(76,217,100,0.06);
      border: 1px solid rgba(76,217,100,0.15);
      border-radius: 10px;
      padding: 10px;
      max-height: 200px;
      overflow-y: auto;
      animation: fadeIn 0.4s ease;
    }
    .q-explanation b {
      color: #4cd964;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== Divider ===== */
    .divider {
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      margin: 10px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: rgba(255,255,255,0.12);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    /* ===== Answer Pool ===== */
    .answer-pool {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 8px 0 40px;
    }

    .answer-chip {
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.82rem;
      font-weight: 500;
      color: #fff;
      cursor: grab;
      touch-action: none;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.3s;
      white-space: nowrap;
    }

    .answer-chip:active {
      cursor: grabbing;
    }

    .answer-chip.dragging-source {
      opacity: 0.3;
      transform: scale(0.95);
    }

    .answer-chip.placed {
      display: none;
    }

    /* Ghost (拖動時跟隨手指的複製品) */
    .drag-ghost {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      background: rgba(249, 212, 35, 0.2);
      border: 2px solid #f9d423;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
      transform: translate(-50%, -50%) scale(1.1);
      transition: none;
    }

    /* ===== Completion ===== */
    .completion-banner {
      text-align: center;
      margin-top: 20px;
      animation: fadeIn 0.6s ease;
    }
    .completion-banner .emoji { font-size: 3rem; }
    .completion-banner h2 {
      font-size: 1.3rem;
      margin: 8px 0;
      background: linear-gradient(90deg, #f9d423, #ff4e50);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .restart-btn {
      margin-top: 16px;
      padding: 12px 32px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #1a1a2e;
      background: linear-gradient(135deg, #f9d423, #ff4e50);
      border: none;
      border-radius: 14px;
      cursor: pointer;
    }

    /* ===== Chaos Monkey ===== */
    .chaos-monkey {
      cursor: pointer;
      font-size: 0.6rem;
      opacity: 0.55;
      display: inline;
      transition: all 0.3s ease;
      vertical-align: middle;
    }
    .chaos-monkey:hover {
      opacity: 1;
      transform: scale(1.4);
    }

    .monkey-found-banner {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }
    .monkey-found-card {
      background: rgba(255,255,255,0.1);
      border: 2px solid #f9d423;
      border-radius: 20px;
      padding: 30px 24px;
      text-align: center;
      max-width: 300px;
      animation: monkeyPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes monkeyPop {
      from { transform: scale(0.3) rotate(-10deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .monkey-found-card .big-monkey { font-size: 4rem; }
    .monkey-found-card h3 {
      font-size: 1.2rem;
      margin: 12px 0 6px;
      background: linear-gradient(90deg, #f9d423, #ff4e50);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .monkey-found-card p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 16px;
    }
    .monkey-dismiss-btn {
      padding: 10px 28px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #1a1a2e;
      background: linear-gradient(135deg, #f9d423, #ff4e50);
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    /* ===== Reverse Lookup Highlight ===== */
    .question-card.highlighted {
      border-color: #f9d423;
      box-shadow: 0 0 18px rgba(249, 212, 35, 0.5), 0 0 36px rgba(249, 212, 35, 0.2);
      animation: highlightPulse 1.5s ease-in-out infinite;
    }
    @keyframes highlightPulse {
      0%, 100% { box-shadow: 0 0 18px rgba(249,212,35,0.5), 0 0 36px rgba(249,212,35,0.2); }
      50%      { box-shadow: 0 0 26px rgba(249,212,35,0.7), 0 0 50px rgba(249,212,35,0.3); }
    }
    .answer-chip.selected {
      background: rgba(249, 212, 35, 0.25);
      border-color: #f9d423;
      box-shadow: 0 0 10px rgba(249,212,35,0.3);
    }
    .reverse-lookup-tip {
      text-align: center;
      font-size: 0.72rem;
      color: #f9d423;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .reverse-lookup-tip.show {
      opacity: 0.7;
      max-height: 30px;
      margin-bottom: 4px;
    }

    .monkey-hint-bar {
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      margin-top: 4px;
      margin-bottom: 2px;
      transition: opacity 0.3s;
    }
    .monkey-hint-bar.found {
      color: #f9d423;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Flashcard</h1>
    <div class="subtitle">把答案拖進正確的題目卡片中</div>
  </div>

  <div class="questions-grid" id="questionsGrid"></div>

  <div class="monkey-hint-bar" id="monkeyHint">🐒 有一隻 Chaos Monkey 藏在某個詳解裡，找到牠！</div>

  <div class="reverse-lookup-tip" id="reverseTip">💡 點擊的答案是這些題目的正確答案</div>

  <div class="divider">⬇ 拖動答案到上方題目 ⬇  ·  點擊答案可反向查詢</div>

  <div class="answer-pool" id="answerPool"></div>

  <div id="completionArea"></div>

  <script>
    // ==================== 題庫 ====================
    const questions = [
      {
        id: 1,
        question: 'Es ______ viele alte Gemälde im Palastmuseum in Taipeh.',
        chinese: '故宮博物院裡有許多古畫。',
        options: ['haben', 'hat', 'geht', 'gibt'],
        labels: ['A', 'B', 'C', 'D'],
        correctIndex: 3,
        explanation: '這是德語最經典的<b>存在句型「Es gibt + 賓語（Accusativ）」</b>，意思是「有……存在於某處」。<br><br>' +
          '• 「Es」是形式主語（無實義），「gibt」是 geben 的第三人稱單數現在式。<br>' +
          '• 後面永遠接<b>第四格（Accusativ）</b>：viele alte Gemälde（許多古畫）。<br>' +
          '• 類似英文的 "There is/are..."，但德語只能用 "Es gibt" 表達「存在」。<br><br>' +
          '<b>🎤 導遊實務應用：</b><br>' +
          '帶外國團到故宮時，您可以說：<br>' +
          '「Im Nationalen Palastmuseum in Taipeh gibt es mehr als 700.000 Kunstwerke aus China. Es gibt auch viele alte Gemälde der Song-Dynastie.」<br>' +
          '這樣介紹展品既自然又專業。<br><br>' +
          '<b>❌ 為什麼其他錯？</b><br>' +
          '• (A) haben：haben 是「擁有」，主語若是複數或 wir/ihr/sie 才用 haben；Es 單數要用 hat，但「Es haben」文法不通。<br>' +
          '• (B) hat：單數第三人稱，但「Es hat viele alte Gemälde」聽起來像「它擁有畫」，不符合存在句。<br>' +
          '• (C) geht：Es geht 是「進行、情況如何」（Es geht um... = 關於……），或天氣（Es geht ein starker Wind），不能表存在。<br><br>' +
          '<b>💡 記憶口訣：</b>看到「Es ______ viele... im/in/am...」→ 99% 是 gibt！<br>' +
          '<b>✏️ 練習：</b>Es gibt viele Tempel in Taipeh.（台北有很多廟。）'
      },
      {
        id: 2,
        question: 'Ich unterhalte ______ gern mit Ausländern.',
        chinese: '我很喜歡跟外國人聊天。',
        options: ['mich', 'sich', 'ihn', 'uns'],
        labels: ['A', 'B', 'C', 'D'],
        correctIndex: 0,
        explanation: '動詞 <b>sich unterhalten</b> 是<b>反身動詞</b>（reflexives Verb），意思是「聊天、交談」。第一人稱單數的反身代詞必須用 <b>mich</b>。<br>' +
          '完整句：Ich unterhalte <b>mich</b> gern mit Ausländern.<br>' +
          '反身動詞在德語中非常多（如 sich freuen、sich erinnern），記住：主語與受詞是同一人時，一定要加反身代詞。<br><br>' +
          '<b>🎤 導遊實務應用：</b><br>' +
          '「Ich unterhalte mich gern mit Touristen über die Geschichte Taiwans.」<br>' +
          '（我很喜歡跟遊客聊台灣歷史。）——自我介紹時超好用！<br><br>' +
          '<b>❌ 為什麼其他錯？</b><br>' +
          '• (B) sich：第三人稱單/複數才用 sich（er unterhält sich / sie unterhalten sich）。<br>' +
          '• (C) ihn：第四格陽性「他」，但這裡沒有「他」這個對象。<br>' +
          '• (D) uns：第一人稱複數「我們」。<br><br>' +
          '<b>💡 學習延伸：</b>常見反身動詞表：sich waschen（洗澡）、sich beeilen（趕快）、sich setzen（坐下）。<br>' +
          '口訣：「我自己用 mich，你自己用 dich，他自己用 sich，我們自己用 uns。」'
      },
      {
        id: 3,
        question: 'Ich glaube, es hat ______.',
        chinese: '我覺得門鈴響了／電話響了。',
        options: ['geklungen', 'geklingelt', 'gelungen', 'klingen'],
        labels: ['A', 'B', 'C', 'D'],
        correctIndex: 1,
        explanation: '這是完成式（Perfekt）：es hat + Partizip II。<br>' +
          '動詞 <b>klingeln</b>（鈴響、門鈴響）→ Partizip II 是 <b>ge-klingelt</b>（規則動詞，加 ge-，-t 結尾）。<br>' +
          '常見情境：電話響（Das Telefon hat geklingelt.）或門鈴。<br><br>' +
          '<b>❌ 為什麼其他錯？</b><br>' +
          '• (A) geklungen：klingen（聽起來、發出聲音）的 Partizip II，但「es hat geklungen」較少用於門鈴。<br>' +
          '• (C) gelungen：gelingen（成功）的 Partizip II，意思完全不同（Es ist mir gelungen = 我成功了）。<br>' +
          '• (D) klingen：原形，不能放在 hat 後面。<br><br>' +
          '<b>🎤 導遊應用：</b>客人問「Was war das für ein Geräusch？」您可答：<br>' +
          '「Ich glaube, es hat geklingelt. Vielleicht ist der Bus schon da.」'
      },
      {
        id: 4,
        question: 'Herr Meier ______ gestern von Frankfurt nach Hongkong.',
        chinese: '梅爾先生昨天從法蘭克福飛到香港。',
        options: ['flog', 'fliegte', 'fliegt', 'flug'],
        labels: ['A', 'B', 'C', 'D'],
        correctIndex: 0,
        explanation: '<b>fliegen</b> 是強變化不規則動詞（starkes Verb）。過去式（Präteritum）是 <b>flog</b>（不是加 -te）。<br>' +
          '昨天的事用過去式最自然。<br><br>' +
          '<b>📝 變化表：</b>fliegen – flog – ist geflogen<br><br>' +
          '<b>❌ 為什麼其他錯？</b><br>' +
          '• (B) fliegte：弱變化動詞才加 -te，fliegen 是強變化，不能這樣變。<br>' +
          '• (C) fliegt：現在式，不符合「gestern」。<br>' +
          '• (D) flug：根本不存在。<br><br>' +
          '<b>💡 學習延伸：</b>常考強變化動詞：fliegen-flog、gehen-ging、sehen-sah、kommen-kam。背熟這些，文法分數直接 +20 分。'
      }
    ];

    // ==================== 產生答案卡片資料 ====================
    let answerChips = [];
    questions.forEach(q => {
      q.options.forEach((opt, i) => {
        answerChips.push({
          chipId: `q${q.id}-${i}`,
          questionId: q.id,
          label: q.labels[i],
          text: opt,
          isCorrect: i === q.correctIndex
        });
      });
    });

    // 洗牌
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    shuffle(answerChips);

    // ==================== 狀態 ====================
    let solvedSet = new Set(); // 已答對的題目 ID
    let monkeyQuestionId = null; // 🐒 藏在哪一題
    let monkeyCharIndex = null;  // 🐒 插在詳解文字的哪個位置
    let monkeyFound = false;

    // ==================== Chaos Monkey 初始化 ====================
    function initChaosMonkey() {
      // 隨機選一題藏猴子
      monkeyQuestionId = questions[Math.floor(Math.random() * questions.length)].id;
      // 隨機選詳解中的插入位置（避開開頭和結尾 3 字元）
      const exp = questions.find(q => q.id === monkeyQuestionId).explanation;
      const minPos = 3;
      const maxPos = exp.length - 3;
      monkeyCharIndex = Math.floor(Math.random() * (maxPos - minPos)) + minPos;
      monkeyFound = false;
      updateMonkeyHint();
    }

    function getExplanationWithMonkey(q) {
      let text = q.explanation;
      if (q.id === monkeyQuestionId && !monkeyFound) {
        // 在 monkeyCharIndex 位置插入猴子
        const before = text.slice(0, monkeyCharIndex);
        const after = text.slice(monkeyCharIndex);
        text = `${before}<span class="chaos-monkey" onclick="foundMonkey(event)">🐒</span>${after}`;
      }
      return text;
    }

    function foundMonkey(e) {
      e.stopPropagation();
      if (monkeyFound) return;
      monkeyFound = true;
      updateMonkeyHint();

      // 彈出慶祝
      const banner = document.createElement('div');
      banner.className = 'monkey-found-banner';
      banner.id = 'monkeyBanner';
      banner.innerHTML = `
        <div class="monkey-found-card">
          <div class="big-monkey">🐒</div>
          <h3>你找到 Chaos Monkey 了！</h3>
          <p>牠藏在第 ${monkeyQuestionId} 題的詳解裡</p>
          <button class="monkey-dismiss-btn" onclick="dismissMonkey()">知道了 👍</button>
        </div>
      `;
      document.body.appendChild(banner);

      // 更新詳解：把猴子標亮
      renderQuestions();
    }

    function dismissMonkey() {
      const banner = document.getElementById('monkeyBanner');
      if (banner) banner.remove();
    }

    function updateMonkeyHint() {
      const hint = document.getElementById('monkeyHint');
      if (!hint) return;
      if (monkeyFound) {
        hint.textContent = '🐒 Chaos Monkey 已被你抓到了！';
        hint.classList.add('found');
      } else {
        hint.textContent = '🐒 有一隻 Chaos Monkey 藏在某個詳解裡，找到牠！';
        hint.classList.remove('found');
      }
    }

    // ==================== 渲染題目卡片 ====================
    function renderQuestions() {
      const grid = document.getElementById('questionsGrid');
      grid.innerHTML = questions.map(q => `
        <div class="question-card ${solvedSet.has(q.id) ? 'solved' : ''}" data-qid="${q.id}">
          <span class="q-number">第 ${q.id} 題</span>
          <div class="q-text">${q.question}</div>
          <div class="q-chinese-toggle" onclick="toggleCh(this, ${q.id})">
            <span class="arrow">▶</span> 中文翻譯
          </div>
          <div class="q-chinese" id="ch-${q.id}">${q.chinese}</div>
          <div class="q-drop-zone" id="dz-${q.id}">
            ${solvedSet.has(q.id) ? getCorrectLabel(q) : '將答案拖到這裡'}
          </div>
          ${solvedSet.has(q.id) ? `<div class="q-explanation">✅ ${getExplanationWithMonkey(q)}</div>` : ''}
        </div>
      `).join('');
    }

    function getCorrectLabel(q) {
      return `(${q.labels[q.correctIndex]}) ${q.options[q.correctIndex]}`;
    }

    // ==================== 渲染答案池 ====================
    function renderPool() {
      const pool = document.getElementById('answerPool');
      pool.innerHTML = answerChips.map(chip => `
        <div class="answer-chip ${solvedSet.has(chip.questionId) && chip.isCorrect ? 'placed' : ''}"
             data-chip-id="${chip.chipId}"
             data-qid="${chip.questionId}"
             data-correct="${chip.isCorrect}">
          (${chip.label}) ${chip.text}
        </div>
      `).join('');

      // 綁定拖動事件
      pool.querySelectorAll('.answer-chip:not(.placed)').forEach(el => {
        el.addEventListener('pointerdown', onDragStart);
      });
    }

    // ==================== 中文翻譯 ====================
    function toggleCh(btn, qid) {
      btn.classList.toggle('open');
      document.getElementById(`ch-${qid}`).classList.toggle('show');
    }

    // ==================== 拖放系統 ====================
    let dragState = null; // { chipEl, ghost, chipData, startX, startY }

    function onDragStart(e) {
      e.preventDefault();
      const el = e.currentTarget;
      const chipId = el.dataset.chipId;
      const chipData = answerChips.find(c => c.chipId === chipId);
      if (!chipData) return;

      // 建立 ghost
      const ghost = document.createElement('div');
      ghost.className = 'drag-ghost';
      ghost.textContent = `(${chipData.label}) ${chipData.text}`;
      document.body.appendChild(ghost);

      const x = e.clientX;
      const y = e.clientY;
      ghost.style.left = x + 'px';
      ghost.style.top = y + 'px';

      el.classList.add('dragging-source');

      dragState = { chipEl: el, ghost, chipData, startX: x, startY: y };

      document.addEventListener('pointermove', onDragMove);
      document.addEventListener('pointerup', onDragEnd);
      document.addEventListener('pointercancel', onDragEnd);
    }

    function onDragMove(e) {
      if (!dragState) return;
      e.preventDefault();

      const x = e.clientX;
      const y = e.clientY;
      dragState.ghost.style.left = x + 'px';
      dragState.ghost.style.top = y + 'px';

      // 檢查是否 hover 在某張卡片上
      document.querySelectorAll('.question-card').forEach(card => {
        const rect = card.getBoundingClientRect();
        if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
          if (!card.classList.contains('solved')) {
            card.classList.add('drag-over');
          }
        } else {
          card.classList.remove('drag-over');
        }
      });
    }

    function onDragEnd(e) {
      if (!dragState) return;

      const x = e.clientX;
      const y = e.clientY;
      const { chipEl, ghost, chipData, startX, startY } = dragState;

      // 移除 ghost
      ghost.remove();
      chipEl.classList.remove('dragging-source');

      // 清除所有 drag-over
      document.querySelectorAll('.question-card').forEach(card => {
        card.classList.remove('drag-over');
      });

      // 計算移動距離
      const dist = Math.sqrt((x - startX) ** 2 + (y - startY) ** 2);

      if (dist < 10) {
        // ===== 短按 → 反向查詢 =====
        reverseLookup(chipData, chipEl);
      } else {
        // ===== 拖動 → 嘗試作答 =====
        let targetCard = null;
        document.querySelectorAll('.question-card:not(.solved)').forEach(card => {
          const rect = card.getBoundingClientRect();
          if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
            targetCard = card;
          }
        });

        if (targetCard) {
          const targetQid = parseInt(targetCard.dataset.qid);
          const targetQ = questions.find(q => q.id === targetQid);
          const correctText = targetQ.options[targetQ.correctIndex];
          if (chipData.text === correctText) {
            solvedSet.add(targetQid);
            chipEl.classList.add('placed');
            clearReverseLookup();
            renderQuestions();
            renderPool();
            checkCompletion();
          }
        }
      }

      // 清除
      document.removeEventListener('pointermove', onDragMove);
      document.removeEventListener('pointerup', onDragEnd);
      document.removeEventListener('pointercancel', onDragEnd);
      dragState = null;
    }

    // ==================== 反向查詢 ====================
    function reverseLookup(chipData, chipEl) {
      // 先清除之前的高亮
      clearReverseLookup();

      // 找出所有正確答案文字 === chipData.text 的未解題目
      const matchingQids = questions
        .filter(q => !solvedSet.has(q.id) && q.options[q.correctIndex] === chipData.text)
        .map(q => q.id);

      if (matchingQids.length > 0) {
        // 高亮匹配的題目卡片
        matchingQids.forEach(qid => {
          const card = document.querySelector(`.question-card[data-qid="${qid}"]`);
          if (card) card.classList.add('highlighted');
        });

        // 高亮被點擊的 chip
        chipEl.classList.add('selected');

        // 顯示提示
        document.getElementById('reverseTip').classList.add('show');
      }
    }

    function clearReverseLookup() {
      document.querySelectorAll('.question-card.highlighted').forEach(c => c.classList.remove('highlighted'));
      document.querySelectorAll('.answer-chip.selected').forEach(c => c.classList.remove('selected'));
      document.getElementById('reverseTip').classList.remove('show');
    }

    // 點擊空白處清除高亮
    document.addEventListener('pointerdown', (e) => {
      if (!e.target.closest('.answer-chip')) {
        clearReverseLookup();
      }
    });

    // ==================== 完成判斷 ====================
    function checkCompletion() {
      if (solvedSet.size === questions.length) {
        document.getElementById('completionArea').innerHTML = `
          <div class="completion-banner">
            <div class="emoji">🎉</div>
            <h2>全部答對了！太棒了！</h2>
            <button class="restart-btn" onclick="restart()">再玩一次 🔄</button>
          </div>
        `;
      }
    }

    function restart() {
      solvedSet.clear();
      shuffle(answerChips);
      document.getElementById('completionArea').innerHTML = '';
      dismissMonkey();
      initChaosMonkey();
      renderQuestions();
      renderPool();
    }

    // ==================== 啟動 ====================
    initChaosMonkey();
    renderQuestions();
    renderPool();
  </script>
</body>
</html>
