<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>德語 Flashcard — 拖放版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #fff;
      padding: 12px;
      overflow-x: hidden;
      touch-action: pan-y;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ===== Header ===== */
    .header {
      text-align: center;
      padding: 12px 0 8px;
    }
    .header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(90deg, #f9d423, #ff4e50);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .subtitle {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.45);
      margin-top: 4px;
    }

    /* ===== Questions Grid (2×2) ===== */
    .questions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 12px 0;
    }

    .question-card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 14px 12px;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .question-card.drag-over {
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 0 15px rgba(255,255,255,0.15);
    }

    .question-card.solved {
      border-color: #4cd964;
      box-shadow: 0 0 20px rgba(76, 217, 100, 0.4), 0 0 40px rgba(76, 217, 100, 0.15);
      animation: glowPulse 2s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(76,217,100,0.4), 0 0 40px rgba(76,217,100,0.15); }
      50%      { box-shadow: 0 0 28px rgba(76,217,100,0.6), 0 0 56px rgba(76,217,100,0.25); }
    }

    .q-number {
      display: inline-block;
      background: linear-gradient(135deg, #f9d423, #ff4e50);
      color: #1a1a2e;
      font-weight: 700;
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 8px;
      align-self: flex-start;
    }

    .q-text {
      font-size: 0.82rem;
      line-height: 1.55;
      font-weight: 500;
      flex: 1;
      word-break: break-word;
    }

    .q-chinese-toggle {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .q-chinese-toggle .arrow {
      transition: transform 0.3s;
      display: inline-block;
    }
    .q-chinese-toggle.open .arrow {
      transform: rotate(90deg);
    }

    .q-chinese {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease;
      opacity: 0;
    }
    .q-chinese.show {
      max-height: 60px;
      opacity: 1;
      margin-top: 4px;
    }

    .q-drop-zone {
      margin-top: 8px;
      min-height: 36px;
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.3);
      transition: border-color 0.2s, background 0.2s;
    }

    .question-card.drag-over .q-drop-zone {
      border-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.05);
    }

    .question-card.solved .q-drop-zone {
      border-style: solid;
      border-color: #4cd964;
      background: rgba(76,217,100,0.1);
      color: #4cd964;
      font-weight: 600;
      font-size: 0.78rem;
    }

    .q-explanation {
      margin-top: 6px;
      font-size: 0.68rem;
      line-height: 1.5;
      color: rgba(76,217,100,0.85);
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== Divider ===== */
    .divider {
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      margin: 10px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: rgba(255,255,255,0.12);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    /* ===== Answer Pool ===== */
    .answer-pool {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 8px 0 40px;
    }

    .answer-chip {
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.82rem;
      font-weight: 500;
      color: #fff;
      cursor: grab;
      touch-action: none;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.3s;
      white-space: nowrap;
    }

    .answer-chip:active {
      cursor: grabbing;
    }

    .answer-chip.dragging-source {
      opacity: 0.3;
      transform: scale(0.95);
    }

    .answer-chip.placed {
      display: none;
    }

    /* Ghost (拖動時跟隨手指的複製品) */
    .drag-ghost {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      background: rgba(249, 212, 35, 0.2);
      border: 2px solid #f9d423;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
      transform: translate(-50%, -50%) scale(1.1);
      transition: none;
    }

    /* ===== Completion ===== */
    .completion-banner {
      text-align: center;
      margin-top: 20px;
      animation: fadeIn 0.6s ease;
    }
    .completion-banner .emoji { font-size: 3rem; }
    .completion-banner h2 {
      font-size: 1.3rem;
      margin: 8px 0;
      background: linear-gradient(90deg, #f9d423, #ff4e50);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .restart-btn {
      margin-top: 16px;
      padding: 12px 32px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #1a1a2e;
      background: linear-gradient(135deg, #f9d423, #ff4e50);
      border: none;
      border-radius: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🇩🇪 德語 Flashcard</h1>
    <div class="subtitle">把答案拖進正確的題目卡片中</div>
  </div>

  <div class="questions-grid" id="questionsGrid"></div>

  <div class="divider">⬇ 拖動答案到上方題目 ⬇</div>

  <div class="answer-pool" id="answerPool"></div>

  <div id="completionArea"></div>

  <script>
    // ==================== 題庫 ====================
    const questions = [
      {
        id: 1,
        question: 'Es ______ viele alte Gemälde im Palastmuseum in Taipeh.',
        chinese: '故宮博物院裡有許多古畫。',
        options: ['haben', 'hat', 'geht', 'gibt'],
        labels: ['A', 'B', 'C', 'D'],
        correctIndex: 3,
        explanation: '這是德語最經典的存在句型「Es gibt + 賓語（Akkusativ）」，意思是「有……存在於某處」。'
      },
      {
        id: 2,
        question: 'Ich unterhalte ______ gern mit Ausländern.',
        chinese: '我很喜歡跟外國人聊天。',
        options: ['mich', 'sich', 'ihn', 'uns'],
        labels: ['A', 'B', 'C', 'D'],
        correctIndex: 0,
        explanation: '動詞 sich unterhalten 是反身動詞（reflexives Verb），意思是「聊天、交談」。第一人稱單數的反身代詞必須用 mich。'
      },
      {
        id: 3,
        question: 'Ich glaube, es hat ______.',
        chinese: '我覺得門鈴響了／電話響了。',
        options: ['geklungen', 'geklingelt', 'gelungen', 'klingen'],
        labels: ['A', 'B', 'C', 'D'],
        correctIndex: 1,
        explanation: '這是完成式（Perfekt）：es hat + Partizip II。klingeln（響鈴）的過去分詞是 geklingelt。'
      },
      {
        id: 4,
        question: 'Herr Meier ______ gestern von Frankfurt nach Hongkong.',
        chinese: '梅爾先生昨天從法蘭克福飛到香港。',
        options: ['flog', 'fliegte', 'fliegt', 'flug'],
        labels: ['A', 'B', 'C', 'D'],
        correctIndex: 0,
        explanation: 'fliegen 是強變化不規則動詞（starkes Verb）。過去式（Präteritum）是 flog（不是加 -te）。'
      }
    ];

    // ==================== 產生答案卡片資料 ====================
    let answerChips = [];
    questions.forEach(q => {
      q.options.forEach((opt, i) => {
        answerChips.push({
          chipId: `q${q.id}-${i}`,
          questionId: q.id,
          label: q.labels[i],
          text: opt,
          isCorrect: i === q.correctIndex
        });
      });
    });

    // 洗牌
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    shuffle(answerChips);

    // ==================== 狀態 ====================
    let solvedSet = new Set(); // 已答對的題目 ID

    // ==================== 渲染題目卡片 ====================
    function renderQuestions() {
      const grid = document.getElementById('questionsGrid');
      grid.innerHTML = questions.map(q => `
        <div class="question-card ${solvedSet.has(q.id) ? 'solved' : ''}" data-qid="${q.id}">
          <span class="q-number">第 ${q.id} 題</span>
          <div class="q-text">${q.question}</div>
          <div class="q-chinese-toggle" onclick="toggleCh(this, ${q.id})">
            <span class="arrow">▶</span> 中文翻譯
          </div>
          <div class="q-chinese" id="ch-${q.id}">${q.chinese}</div>
          <div class="q-drop-zone" id="dz-${q.id}">
            ${solvedSet.has(q.id) ? getCorrectLabel(q) : '將答案拖到這裡'}
          </div>
          ${solvedSet.has(q.id) ? `<div class="q-explanation">✅ ${q.explanation}</div>` : ''}
        </div>
      `).join('');
    }

    function getCorrectLabel(q) {
      return `(${q.labels[q.correctIndex]}) ${q.options[q.correctIndex]}`;
    }

    // ==================== 渲染答案池 ====================
    function renderPool() {
      const pool = document.getElementById('answerPool');
      pool.innerHTML = answerChips.map(chip => `
        <div class="answer-chip ${solvedSet.has(chip.questionId) && chip.isCorrect ? 'placed' : ''}"
             data-chip-id="${chip.chipId}"
             data-qid="${chip.questionId}"
             data-correct="${chip.isCorrect}">
          (${chip.label}) ${chip.text}
        </div>
      `).join('');

      // 綁定拖動事件
      pool.querySelectorAll('.answer-chip:not(.placed)').forEach(el => {
        el.addEventListener('pointerdown', onDragStart);
      });
    }

    // ==================== 中文翻譯 ====================
    function toggleCh(btn, qid) {
      btn.classList.toggle('open');
      document.getElementById(`ch-${qid}`).classList.toggle('show');
    }

    // ==================== 拖放系統 ====================
    let dragState = null; // { chipEl, ghost, chipData, startX, startY }

    function onDragStart(e) {
      e.preventDefault();
      const el = e.currentTarget;
      const chipId = el.dataset.chipId;
      const chipData = answerChips.find(c => c.chipId === chipId);
      if (!chipData) return;

      // 建立 ghost
      const ghost = document.createElement('div');
      ghost.className = 'drag-ghost';
      ghost.textContent = `(${chipData.label}) ${chipData.text}`;
      document.body.appendChild(ghost);

      const x = e.clientX;
      const y = e.clientY;
      ghost.style.left = x + 'px';
      ghost.style.top = y + 'px';

      el.classList.add('dragging-source');

      dragState = { chipEl: el, ghost, chipData, startX: x, startY: y };

      document.addEventListener('pointermove', onDragMove);
      document.addEventListener('pointerup', onDragEnd);
      document.addEventListener('pointercancel', onDragEnd);
    }

    function onDragMove(e) {
      if (!dragState) return;
      e.preventDefault();

      const x = e.clientX;
      const y = e.clientY;
      dragState.ghost.style.left = x + 'px';
      dragState.ghost.style.top = y + 'px';

      // 檢查是否 hover 在某張卡片上
      document.querySelectorAll('.question-card').forEach(card => {
        const rect = card.getBoundingClientRect();
        if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
          if (!card.classList.contains('solved')) {
            card.classList.add('drag-over');
          }
        } else {
          card.classList.remove('drag-over');
        }
      });
    }

    function onDragEnd(e) {
      if (!dragState) return;

      const x = e.clientX;
      const y = e.clientY;
      const { chipEl, ghost, chipData } = dragState;

      // 移除 ghost
      ghost.remove();
      chipEl.classList.remove('dragging-source');

      // 清除所有 drag-over
      document.querySelectorAll('.question-card').forEach(card => {
        card.classList.remove('drag-over');
      });

      // 找到放下的卡片
      let targetCard = null;
      document.querySelectorAll('.question-card:not(.solved)').forEach(card => {
        const rect = card.getBoundingClientRect();
        if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
          targetCard = card;
        }
      });

      if (targetCard) {
        const targetQid = parseInt(targetCard.dataset.qid);
        // 檢查是否正確：這個 chip 必須屬於這個題目且是正確答案
        if (chipData.questionId === targetQid && chipData.isCorrect) {
          // ✅ 正確！
          solvedSet.add(targetQid);
          renderQuestions();
          renderPool();
          checkCompletion();
        }
        // 錯誤 → 什麼都不做，chip 已經在原位
      }

      // 清除
      document.removeEventListener('pointermove', onDragMove);
      document.removeEventListener('pointerup', onDragEnd);
      document.removeEventListener('pointercancel', onDragEnd);
      dragState = null;
    }

    // ==================== 完成判斷 ====================
    function checkCompletion() {
      if (solvedSet.size === questions.length) {
        document.getElementById('completionArea').innerHTML = `
          <div class="completion-banner">
            <div class="emoji">🎉</div>
            <h2>全部答對了！太棒了！</h2>
            <button class="restart-btn" onclick="restart()">再玩一次 🔄</button>
          </div>
        `;
      }
    }

    function restart() {
      solvedSet.clear();
      shuffle(answerChips);
      document.getElementById('completionArea').innerHTML = '';
      renderQuestions();
      renderPool();
    }

    // ==================== 啟動 ====================
    renderQuestions();
    renderPool();
  </script>
</body>
</html>
