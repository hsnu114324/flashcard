<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Flashcard v3.0</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh; color: #1a1a2e;
      overflow-x: hidden;
      -webkit-user-select: none; user-select: none;
      display: flex;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      width: 260px; min-width: 260px;
      background: #fff;
      border-right: 1px solid #e2e6ea;
      display: flex; flex-direction: column;
      height: 100vh; position: sticky; top: 0;
      overflow-y: auto;
      z-index: 100;
      transition: transform 0.3s ease;
    }
    .sidebar-header {
      padding: 20px 18px 14px;
      border-bottom: 1px solid #eef0f2;
    }
    .sidebar-logo {
      font-size: 1.15rem; font-weight: 700;
      color: #1a1a2e; display: flex; align-items: center; gap: 8px;
    }
    .sidebar-logo .logo-icon {
      width: 28px; height: 28px; border-radius: 8px;
      background: linear-gradient(135deg, #6c5ce7, #a78bfa);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 0.85rem; font-weight: 700;
    }
    .sidebar-search {
      margin-top: 12px; position: relative;
    }
    .sidebar-search input {
      width: 100%; padding: 8px 12px 8px 34px;
      border: 1.5px solid #e2e6ea; border-radius: 10px;
      font-size: 0.85rem; color: #555; background: #f8f9fb;
      outline: none; transition: border-color 0.2s;
    }
    .sidebar-search input:focus { border-color: #a78bfa; }
    .sidebar-search .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      font-size: 0.85rem; opacity: 0.4;
    }

    .sidebar-section {
      padding: 14px 12px 6px;
    }
    .sidebar-section-title {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      color: #999; letter-spacing: 0.5px; padding: 0 6px; margin-bottom: 6px;
    }

    .folder-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 10px; cursor: pointer;
      transition: background 0.15s; margin-bottom: 2px;
      font-size: 0.88rem; font-weight: 500; color: #444;
    }
    .folder-item:hover { background: #f3f0ff; }
    .folder-item.active { background: #ede9fe; color: #6c5ce7; font-weight: 600; }
    .folder-item .folder-icon { font-size: 1rem; flex-shrink: 0; width: 22px; text-align: center; }
    .folder-item .folder-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .folder-item .folder-arrow {
      font-size: 0.65rem; color: #aaa; transition: transform 0.25s; flex-shrink: 0;
    }
    .folder-item.active .folder-arrow,
    .folder-item.expanded .folder-arrow { transform: rotate(90deg); }

    .folder-children {
      padding-left: 16px;
      max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .folder-children.open { max-height: 400px; }

    .file-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: 8px; cursor: pointer;
      font-size: 0.82rem; color: #666; transition: background 0.15s;
      margin-bottom: 1px;
    }
    .file-item:hover { background: #f5f3ff; }
    .file-item.active { background: #ede9fe; color: #6c5ce7; font-weight: 600; }
    .file-item .file-icon { font-size: 0.85rem; flex-shrink: 0; width: 20px; text-align: center; }
    .file-item .file-status {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: #e0e0e0; transition: background 0.3s;
    }
    .file-item .file-status.solved { background: #4cd964; }
    .file-item .file-status.exp-done { background: #a78bfa; }

    .sidebar-footer {
      margin-top: auto; padding: 14px 18px;
      border-top: 1px solid #eef0f2;
      font-size: 0.75rem; color: #aaa; text-align: center;
    }

    /* ===== Mobile sidebar toggle ===== */
    .sidebar-toggle {
      display: none; position: fixed; top: 12px; left: 12px; z-index: 200;
      width: 40px; height: 40px; border-radius: 12px;
      background: #fff; border: 1.5px solid #e2e6ea;
      color: #555; font-size: 1.1rem; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      align-items: center; justify-content: center;
    }
    .sidebar-overlay {
      display: none; position: fixed; inset: 0; z-index: 99;
      background: rgba(0,0,0,0.3);
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed; left: 0; top: 0;
        transform: translateX(-100%);
        box-shadow: 4px 0 20px rgba(0,0,0,0.1);
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-toggle { display: flex; }
      .sidebar-overlay.show { display: block; }
      .main-content { margin-left: 0 !important; }
    }

    /* ===== Main Content ===== */
    .main-content {
      flex: 1; min-width: 0;
      padding: 20px 24px;
      overflow-y: auto; height: 100vh;
      touch-action: pan-y;
    }

    /* ===== Header ===== */
    .header {
      text-align: center; padding: 8px 0 10px;
    }
    .header h1 {
      font-size: 1.6rem; font-weight: 800;
      background: linear-gradient(135deg, #6c5ce7, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header .subtitle { font-size: 0.9rem; color: #999; margin-top: 4px; }

    /* ===== Navigation ===== */
    .nav-row {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; margin: 10px 0;
    }
    .nav-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: #fff; border: 1.5px solid #e2e6ea;
      color: #555; font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; box-shadow: 0 2px 6px rgba(0,0,0,0.04);
      flex-shrink: 0;
    }
    .nav-btn:hover { background: #f5f3ff; border-color: #a78bfa; color: #6c5ce7; }
    .nav-btn:active { transform: scale(0.92); }
    .nav-btn.disabled { opacity: 0.3; pointer-events: none; }
    .nav-indicator {
      font-size: 1rem; font-weight: 600; color: #888;
      min-width: 80px; text-align: center;
    }

    /* ===== Question Card ===== */
    .question-card {
      background: #fff;
      border: 2px solid #e8e8ee;
      border-radius: 20px; padding: 24px 20px;
      min-height: 180px; display: flex; flex-direction: column;
      position: relative;
      transition: border-color 0.3s, box-shadow 0.3s;
      margin-bottom: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .question-card.drag-over-answer {
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(167,139,250,0.15), 0 4px 16px rgba(0,0,0,0.06);
    }
    .question-card.drag-over-exp {
      border-color: #6c5ce7;
      box-shadow: 0 0 0 3px rgba(108,92,231,0.15), 0 4px 16px rgba(0,0,0,0.06);
    }
    .question-card.solved {
      border-color: #4cd964;
      box-shadow: 0 0 0 3px rgba(76,217,100,0.2), 0 4px 20px rgba(76,217,100,0.1);
      animation: glowPulse 2.5s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(76,217,100,0.2), 0 4px 20px rgba(76,217,100,0.1); }
      50%      { box-shadow: 0 0 0 5px rgba(76,217,100,0.3), 0 4px 28px rgba(76,217,100,0.15); }
    }

    .q-number {
      display: inline-block;
      background: linear-gradient(135deg, #6c5ce7, #a78bfa);
      color: #fff; font-weight: 700; font-size: 0.82rem;
      padding: 4px 14px; border-radius: 12px;
      margin-bottom: 14px; align-self: flex-start;
    }
    .q-text {
      font-size: 1.15rem; line-height: 1.7; font-weight: 500;
      color: #2d2d3a; word-break: break-word;
    }
    .q-chinese-toggle {
      font-size: 0.9rem; color: #aaa; cursor: pointer;
      margin-top: 12px; display: flex; align-items: center; gap: 5px;
      transition: color 0.2s;
    }
    .q-chinese-toggle:hover { color: #6c5ce7; }
    .q-chinese-toggle .arrow { transition: transform 0.3s; display: inline-block; }
    .q-chinese-toggle.open .arrow { transform: rotate(90deg); }
    .q-chinese {
      font-size: 0.95rem; color: #888; line-height: 1.6;
      max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease; opacity: 0;
    }
    .q-chinese.show { max-height: 80px; opacity: 1; margin-top: 8px; }

    /* ===== Answer Drop Zone ===== */
    .q-drop-zone {
      margin-top: 14px; min-height: 50px;
      border: 2.5px dashed #ddd; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem; color: #bbb;
      transition: all 0.2s; background: #fafbfc;
    }
    .question-card.drag-over-answer .q-drop-zone {
      border-color: #a78bfa; background: #f8f5ff; color: #6c5ce7;
    }
    .question-card.solved .q-drop-zone {
      border-style: solid; border-color: #4cd964;
      background: #f0fdf4; color: #16a34a;
      font-weight: 600; font-size: 1.05rem;
    }

    /* ===== Explanation Zone ===== */
    .exp-zone {
      margin-top: 14px; border-radius: 14px;
      border: 2.5px dashed #ddd;
      padding: 12px; animation: fadeIn 0.4s ease;
      transition: all 0.3s; background: #fafbfc;
    }
    .exp-zone-label {
      font-size: 0.82rem; font-weight: 700; color: #6c5ce7;
      margin-bottom: 8px;
    }
    .question-card.drag-over-exp .exp-zone {
      border-color: #6c5ce7; background: #f5f2ff;
    }
    .exp-zone.completed {
      border-style: solid; border-color: #a78bfa;
      background: #f5f2ff;
      box-shadow: 0 0 0 3px rgba(167,139,250,0.2), 0 4px 16px rgba(167,139,250,0.08);
      animation: expGlow 2.5s ease-in-out infinite;
    }
    @keyframes expGlow {
      0%, 100% { box-shadow: 0 0 0 3px rgba(167,139,250,0.2), 0 4px 16px rgba(167,139,250,0.08); }
      50%      { box-shadow: 0 0 0 5px rgba(167,139,250,0.3), 0 4px 24px rgba(167,139,250,0.12); }
    }

    .exp-slot {
      font-size: 0.85rem; line-height: 1.55;
      padding: 8px 10px; margin: 5px 0;
      border-radius: 10px; border: 1.5px dashed #e0e0e0;
      color: #ccc; min-height: 34px;
      display: flex; align-items: center;
      transition: all 0.3s ease; background: #fff;
    }
    .exp-slot.filled {
      border-style: solid; border-color: #d4ccf7;
      background: #faf8ff; color: #444;
      cursor: grab; touch-action: none; position: relative;
      animation: slotFill 0.4s ease;
    }
    .exp-slot.filled:active { cursor: grabbing; }
    .exp-slot.filled.reorder-source { opacity: 0.3; }
    .exp-slot.insert-above { border-top: 2.5px solid #6c5ce7 !important; }
    .exp-slot.insert-below { border-bottom: 2.5px solid #6c5ce7 !important; }
    @keyframes slotFill {
      from { transform: scale(0.97); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== Divider ===== */
    .divider {
      text-align: center; font-size: 0.82rem;
      color: #bbb; margin: 12px 0; position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%;
      width: 22%; height: 1px; background: #e2e6ea;
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    /* ===== Chip Pools ===== */
    .chip-pool {
      display: flex; flex-wrap: wrap; gap: 10px;
      justify-content: center; padding: 10px 0;
    }

    .answer-chip {
      background: #fff;
      border: 1.5px solid #e2e6ea;
      border-radius: 14px; padding: 12px 20px;
      font-size: 1rem; font-weight: 500; color: #444;
      cursor: grab; touch-action: none;
      transition: all 0.2s;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .answer-chip:hover { border-color: #a78bfa; background: #faf8ff; box-shadow: 0 2px 8px rgba(167,139,250,0.1); }
    .answer-chip:active { cursor: grabbing; }
    .answer-chip.dragging-source { opacity: 0.3; transform: scale(0.95); }
    .answer-chip.placed { display: none; }

    .exp-chip {
      background: #fff;
      border: 1.5px solid #d4ccf7;
      border-radius: 12px; padding: 10px 16px;
      font-size: 0.9rem; font-weight: 500; color: #555;
      cursor: grab; touch-action: none;
      transition: all 0.2s;
      max-width: 100%; line-height: 1.55;
      box-shadow: 0 1px 4px rgba(108,92,231,0.06);
    }
    .exp-chip:hover { border-color: #6c5ce7; background: #f8f5ff; }
    .exp-chip:active { cursor: grabbing; }
    .exp-chip.dragging-source { opacity: 0.3; transform: scale(0.95); }
    .exp-chip.placed { display: none; }

    /* ===== Highlight (reverse lookup) ===== */
    .question-card.highlighted {
      border-color: #f59e0b;
      box-shadow: 0 0 0 3px rgba(245,158,11,0.2), 0 4px 20px rgba(245,158,11,0.1);
      animation: highlightPulse 1.5s ease-in-out infinite;
    }
    @keyframes highlightPulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(245,158,11,0.2), 0 4px 20px rgba(245,158,11,0.1); }
      50%      { box-shadow: 0 0 0 5px rgba(245,158,11,0.3), 0 4px 28px rgba(245,158,11,0.15); }
    }
    .answer-chip.selected {
      background: #fffbeb; border-color: #f59e0b;
      box-shadow: 0 0 0 2px rgba(245,158,11,0.15);
    }
    .reverse-lookup-tip {
      text-align: center; font-size: 0.85rem; color: #f59e0b;
      opacity: 0; max-height: 0; overflow: hidden; transition: all 0.3s ease;
    }
    .reverse-lookup-tip.show { opacity: 0.85; max-height: 30px; margin-bottom: 4px; }

    /* ===== Ghost ===== */
    .drag-ghost {
      position: fixed; z-index: 9999; pointer-events: none;
      border-radius: 14px; padding: 12px 16px;
      font-size: 1rem; font-weight: 600;
      box-shadow: 0 12px 32px rgba(0,0,0,0.12);
      transform: translate(-50%, -50%) scale(1.08);
      transition: none; max-width: 70vw;
    }
    .drag-ghost.ghost-answer {
      background: #fff; border: 2px solid #a78bfa; color: #444;
      white-space: nowrap;
    }
    .drag-ghost.ghost-exp {
      background: #fff; border: 2px solid #6c5ce7; color: #444;
      font-size: 0.88rem; white-space: normal; line-height: 1.45;
    }

    /* ===== Chaos Monkey ===== */
    .chaos-monkey {
      cursor: pointer; font-size: 0.75rem; opacity: 0.35;
      display: inline; transition: all 0.3s ease; vertical-align: middle;
    }
    .chaos-monkey:hover { opacity: 1; transform: scale(1.4); }
    .monkey-found-banner {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      z-index: 10000; display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.3s ease;
    }
    .monkey-found-card {
      background: #fff; border: 2px solid #f59e0b;
      border-radius: 24px; padding: 36px 28px; text-align: center; max-width: 320px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      animation: monkeyPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes monkeyPop {
      from { transform: scale(0.3) rotate(-10deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .monkey-found-card .big-monkey { font-size: 4rem; }
    .monkey-found-card h3 {
      font-size: 1.2rem; margin: 14px 0 8px; font-weight: 700;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .monkey-found-card p { font-size: 0.95rem; color: #888; margin-bottom: 18px; }
    .monkey-dismiss-btn {
      padding: 10px 28px; font-size: 1rem; font-weight: 600; color: #fff;
      background: linear-gradient(135deg, #6c5ce7, #a78bfa); border: none; border-radius: 12px; cursor: pointer;
      transition: transform 0.15s;
    }
    .monkey-dismiss-btn:hover { transform: scale(1.03); }

    .monkey-hint-bar {
      text-align: center; font-size: 0.8rem; color: #bbb;
      margin: 6px 0; transition: all 0.3s;
    }
    .monkey-hint-bar.found { color: #f59e0b; }

    /* ===== Completion ===== */
    .completion-banner {
      text-align: center; margin-top: 24px; animation: fadeIn 0.6s ease;
      background: #fff; border-radius: 20px; padding: 30px 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    .completion-banner .emoji { font-size: 3.5rem; }
    .completion-banner h2 {
      font-size: 1.4rem; margin: 10px 0;
      background: linear-gradient(135deg, #6c5ce7, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .restart-btn {
      margin-top: 16px; padding: 14px 36px; font-size: 1.05rem; font-weight: 600;
      color: #fff; background: linear-gradient(135deg, #6c5ce7, #a78bfa);
      border: none; border-radius: 14px; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(108,92,231,0.25);
    }
    .restart-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(108,92,231,0.3); }

    .section-hidden { display: none; }
    .spacer { height: 60px; }
  </style>
</head>
<body>

  <!-- ===== 左側 Sidebar ===== -->
  <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="logo-icon">F</div>
        Flashcard v3.0
      </div>
      <div class="sidebar-search">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="搜尋題目..." oninput="filterSidebar(this.value)">
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title">題庫</div>

      <div class="folder-item expanded" onclick="toggleFolder(this)">
        <span class="folder-icon">📂</span>
        <span class="folder-name">德語文法練習</span>
        <span class="folder-arrow">▶</span>
      </div>
      <div class="folder-children open" id="questionFolder">
        <!-- JS 渲染 -->
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title">統計</div>
      <div id="sidebarStats" style="padding: 4px 10px; font-size: 0.82rem; color: #888; line-height: 1.8;"></div>
    </div>

    <div class="sidebar-footer">
      🐒 Chaos Monkey Edition<br>
      <span id="sidebarMonkey" style="font-size: 0.72rem; color: #ccc;">尚未找到</span>
    </div>
  </aside>

  <!-- ===== 右側主內容 ===== -->
  <main class="main-content" id="mainContent">
    <div class="header">
      <h1>德語文法 Flashcard</h1>
      <div class="subtitle">把答案拖進正確的題目卡片中</div>
    </div>

    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" onclick="goPage(-1)">◀</button>
      <div class="nav-indicator" id="navIndicator">1 / 4</div>
      <button class="nav-btn" id="nextBtn" onclick="goPage(1)">▶</button>
    </div>

    <div id="cardArea"></div>

    <div class="monkey-hint-bar" id="monkeyHint">🐒 Chaos Monkey 藏在某個詳解裡，找到牠！</div>
    <div class="reverse-lookup-tip" id="reverseTip">💡 點擊的答案是這些題目的正確答案</div>

    <div class="divider" id="answerDivider">⬇ 拖動答案到題目 · 點擊可反向查詢 ⬇</div>
    <div class="chip-pool" id="answerPool"></div>

    <div class="divider section-hidden" id="expDivider">⬇ 拖動詳解到已答對的題目 ⬇</div>
    <div class="chip-pool section-hidden" id="expPool"></div>

    <div class="spacer"></div>
    <div id="completionArea"></div>
  </main>

  <script>
    // ==================== 題庫 ====================
    const questions = [
      {
        id: 1,
        question: 'Es ______ viele alte Gemälde im Palastmuseum in Taipeh.',
        chinese: '故宮博物院裡有許多古畫。',
        options: ['haben', 'hat', 'geht', 'gibt'],
        labels: ['A', 'B', 'C', 'D'],
        correctIndex: 3,
        expParts: [
          '這是德語最經典的存在句型「Es gibt + 賓語（Accusativ）」，意思是「有……存在於某處」。',
          '「Es」是形式主語（無實義），「gibt」是 geben 的第三人稱單數現在式。',
          '後面永遠接第四格（Accusativ）：viele alte Gemälde（許多古畫）。',
          '類似英文的 "There is/are..."，但德語只能用 "Es gibt" 表達「存在」。',

      {

      {
        id: 4,
        question: 'Herr Meier ______ gestern von Frankfurt nach Hongkong.',
        chinese: '梅爾先生昨天從法蘭克福飛到香港。',
        options: ['flog', 'fliegte', 'fliegt', 'flug'],
        labels: ['A', 'B', 'C', 'D'],
        correctIndex: 0,
        expParts: [
          'fliegen 是強變化不規則動詞（starkes Verb）。過去式（Präteritum）是 flog（不是加 -te）。',
          '昨天的事用過去式最自然。',

          '💡 常考強變化動詞：fliegen-flog、gehen-ging、sehen-sah、kommen-kam。背熟這些，文法分數直接 +20 分。'

    ];

    // ==================== 產生答案卡片 ====================
    let answerChips = [];
    questions.forEach(q => {
      q.options.forEach((opt, i) => {
        answerChips.push({
          chipId: `ans-q${q.id}-${i}`, type: 'answer',
          questionId: q.id, label: q.labels[i], text: opt,
          isCorrect: i === q.correctIndex
        });
      });
    });

    // ==================== 產生詳解卡片 ====================
    let expChips = [];
    function buildExpChips() {
      expChips = [];
      questions.forEach(q => {
        q.expParts.forEach((part, i) => {
          expChips.push({
            chipId: `exp-q${q.id}-${i}`, type: 'explanation',
            questionId: q.id, partIndex: i, text: part
          });
        });
      });
      shuffle(expChips);
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    shuffle(answerChips);
    buildExpChips();

    // ==================== 狀態 ====================
    let currentPage = 0;
    let solvedSet = new Set();
    let expPlacedMap = new Map();
    let expCompletedSet = new Set();

    function getExpPlaced(qid) {
      if (!expPlacedMap.has(qid)) expPlacedMap.set(qid, []);
      return expPlacedMap.get(qid);
    }

    // ==================== Sidebar ====================
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('show');
    }
    function toggleFolder(el) {
      el.classList.toggle('expanded');
      const children = el.nextElementSibling;
      if (children) children.classList.toggle('open');
    }
    function filterSidebar(val) {
      const v = val.toLowerCase();
      document.querySelectorAll('#questionFolder .file-item').forEach(item => {
        const text = item.textContent.toLowerCase();
        item.style.display = text.includes(v) ? '' : 'none';
      });
    }

    function renderSidebar() {
      const folder = document.getElementById('questionFolder');
      folder.innerHTML = questions.map((q, idx) => {
        const isSolved = solvedSet.has(q.id);
        const expDone = expCompletedSet.has(q.id);
        let statusClass = '';
        if (expDone) statusClass = 'exp-done';
        else if (isSolved) statusClass = 'solved';
        const isActive = idx === currentPage;
        const preview = q.question.length > 28 ? q.question.slice(0, 28) + '…' : q.question;
        return `<div class="file-item ${isActive ? 'active' : ''}" onclick="goToPage(${idx})">
          <span class="file-icon">📄</span>
          <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">第${q.id}題 ${preview}</span>
          <span class="file-status ${statusClass}"></span>
        </div>`;
      }).join('');

      // 統計
      const stats = document.getElementById('sidebarStats');
      stats.innerHTML = `
        ✅ 答對：${solvedSet.size} / ${questions.length}<br>
        📖 詳解完成：${expCompletedSet.size} / ${questions.length}<br>
        📊 進度：${Math.round((solvedSet.size + expCompletedSet.size) / (questions.length * 2) * 100)}%
      `;

      // Monkey
      const sm = document.getElementById('sidebarMonkey');
      sm.textContent = monkeyFound ? '🐒 已抓到！' : '🐒 尚未找到';
      sm.style.color = monkeyFound ? '#f59e0b' : '#ccc';
    }

    function goToPage(idx) {
      currentPage = idx;
      renderAll();
      // mobile: close sidebar
      if (window.innerWidth <= 768) toggleSidebar();
    }

    // ==================== 分頁導航 ====================
    function goPage(delta) {
      currentPage = Math.max(0, Math.min(questions.length - 1, currentPage + delta));
      renderAll();
    }

    function updateNav() {
      document.getElementById('navIndicator').textContent = `${currentPage + 1} / ${questions.length}`;
      document.getElementById('prevBtn').classList.toggle('disabled', currentPage === 0);
      document.getElementById('nextBtn').classList.toggle('disabled', currentPage === questions.length - 1);
    }

    // ==================== Chaos Monkey ====================
    let monkeyQuestionId = null, monkeyPartIndex = null, monkeyFound = false;

    function initChaosMonkey() {
      const q = questions[Math.floor(Math.random() * questions.length)];
      monkeyQuestionId = q.id;
      monkeyPartIndex = Math.floor(Math.random() * q.expParts.length);
      monkeyFound = false;
      updateMonkeyHint();
    }
    function getExpText(qid, partIndex, text) {
      if (qid === monkeyQuestionId && partIndex === monkeyPartIndex && !monkeyFound) {
        const pos = Math.floor(text.length / 2);
        return text.slice(0, pos) + '<span class="chaos-monkey" onclick="foundMonkey(event)">🐒</span>' + text.slice(pos);
      }
      return text;
    }
    function foundMonkey(e) {
      e.stopPropagation();
      if (monkeyFound) return;
      monkeyFound = true;
      updateMonkeyHint(); renderSidebar();
      const b = document.createElement('div');
      b.className = 'monkey-found-banner'; b.id = 'monkeyBanner';
      b.innerHTML = `<div class="monkey-found-card"><div class="big-monkey">🐒</div><h3>你找到 Chaos Monkey 了！</h3><p>牠藏在第 ${monkeyQuestionId} 題的詳解裡</p><button class="monkey-dismiss-btn" onclick="dismissMonkey()">知道了 👍</button></div>`;
      document.body.appendChild(b);
    }
    function dismissMonkey() { const b = document.getElementById('monkeyBanner'); if (b) b.remove(); }
    function updateMonkeyHint() {
      const h = document.getElementById('monkeyHint'); if (!h) return;
      if (monkeyFound) { h.textContent = '🐒 Chaos Monkey 已被你抓到了！'; h.classList.add('found'); }
      else { h.textContent = '🐒 Chaos Monkey 藏在某個詳解裡，找到牠！'; h.classList.remove('found'); }
    }

    // ==================== 渲染：大卡片 ====================
    function renderCard() {
      const q = questions[currentPage];
      const isSolved = solvedSet.has(q.id);
      const placedArr = getExpPlaced(q.id);
      const expDone = expCompletedSet.has(q.id);
      const totalParts = q.expParts.length;
      const filledCount = placedArr.length;
      const emptyCount = totalParts - filledCount;

      let expZoneHtml = '';
      if (isSolved) {
        const filledHtml = placedArr.map((chipId, arrIdx) => {
          const chip = expChips.find(c => c.chipId === chipId);
          if (!chip) return '';
          const displayText = getExpText(q.id, chip.partIndex, chip.text);
          return `<div class="exp-slot filled" data-chip-id="${chipId}" data-reorder-qid="${q.id}" data-arr-idx="${arrIdx}">${displayText}</div>`;
        }).join('');
        let emptyHtml = '';
        for (let i = 0; i < emptyCount; i++) {
          emptyHtml += `<div class="exp-slot"><span style="opacity:0.3">⬜ 拖入詳解</span></div>`;
        }
        expZoneHtml = `
          <div class="exp-zone ${expDone ? 'completed' : ''}" data-qid="${q.id}">
            <div class="exp-zone-label">📖 詳解區 (${filledCount}/${totalParts})</div>
            ${filledHtml}${emptyHtml}
          </div>`;
      }

      document.getElementById('cardArea').innerHTML = `
        <div class="question-card ${isSolved ? 'solved' : ''}" data-qid="${q.id}">
          <span class="q-number">第 ${q.id} 題</span>
          <div class="q-text">${q.question}</div>
          <div class="q-chinese-toggle" onclick="toggleCh(this, ${q.id})">
            <span class="arrow">▶</span> 中文翻譯
          </div>
          <div class="q-chinese" id="ch-${q.id}">${q.chinese}</div>
          <div class="q-drop-zone" id="dz-${q.id}">
            ${isSolved ? `✅ (${q.labels[q.correctIndex]}) ${q.options[q.correctIndex]}` : '將答案拖到這裡'}
          </div>
          ${expZoneHtml}
        </div>`;
    }

    function bindReorderEvents() {
      document.querySelectorAll('.exp-slot.filled[data-chip-id]').forEach(el => {
        el.addEventListener('pointerdown', onReorderStart);
      });
    }

    // ==================== 渲染：答案池 ====================
    function renderAnswerPool() {
      const q = questions[currentPage];
      const pool = document.getElementById('answerPool');
      const currentChips = answerChips.filter(c => c.questionId === q.id);
      pool.innerHTML = currentChips.map(chip => {
        const isPlaced = solvedSet.has(chip.questionId) && chip.isCorrect;
        return `<div class="answer-chip ${isPlaced ? 'placed' : ''}"
                     data-chip-id="${chip.chipId}" data-drag-type="answer">
                  (${chip.label}) ${chip.text}
                </div>`;
      }).join('');
      pool.querySelectorAll('.answer-chip:not(.placed)').forEach(el => {
        el.addEventListener('pointerdown', onDragStart);
      });
      const isSolved = solvedSet.has(q.id);
      document.getElementById('answerDivider').classList.toggle('section-hidden', isSolved);
      pool.classList.toggle('section-hidden', isSolved);
    }

    // ==================== 渲染：詳解池 ====================
    function renderExpPool() {
      const q = questions[currentPage];
      const divider = document.getElementById('expDivider');
      const pool = document.getElementById('expPool');
      const isSolved = solvedSet.has(q.id);
      const expDone = expCompletedSet.has(q.id);

      if (!isSolved || expDone) {
        divider.classList.add('section-hidden');
        pool.classList.add('section-hidden');
        return;
      }

      divider.classList.remove('section-hidden');
      pool.classList.remove('section-hidden');

      const currentExpChips = expChips.filter(c => c.questionId === q.id);
      const placedArr = getExpPlaced(q.id);

      pool.innerHTML = currentExpChips.map(chip => {
        const isPlaced = placedArr.includes(chip.chipId);
        return `<div class="exp-chip ${isPlaced ? 'placed' : ''}"
                     data-chip-id="${chip.chipId}" data-drag-type="explanation">
                  ${chip.text}
                </div>`;
      }).join('');

      pool.querySelectorAll('.exp-chip:not(.placed)').forEach(el => {
        el.addEventListener('pointerdown', onDragStart);
      });
    }

    // ==================== 中文翻譯 ====================
    function toggleCh(btn, qid) {
      btn.classList.toggle('open');
      document.getElementById(`ch-${qid}`).classList.toggle('show');
    }

    // ==================== 統一拖放 ====================
    let dragState = null;

    function onDragStart(e) {
      e.preventDefault();
      const el = e.currentTarget;
      const chipId = el.dataset.chipId;
      const dragType = el.dataset.dragType;
      let chipData = dragType === 'answer'
        ? answerChips.find(c => c.chipId === chipId)
        : expChips.find(c => c.chipId === chipId);
      if (!chipData) return;

      const ghost = document.createElement('div');
      ghost.className = `drag-ghost ${dragType === 'answer' ? 'ghost-answer' : 'ghost-exp'}`;
      ghost.textContent = dragType === 'answer' ? `(${chipData.label}) ${chipData.text}` : chipData.text;
      document.body.appendChild(ghost);

      const x = e.clientX, y = e.clientY;
      ghost.style.left = x + 'px'; ghost.style.top = y + 'px';
      el.classList.add('dragging-source');
      dragState = { chipEl: el, ghost, chipData, dragType, startX: x, startY: y };

      document.addEventListener('pointermove', onDragMove);
      document.addEventListener('pointerup', onDragEnd);
      document.addEventListener('pointercancel', onDragEnd);
    }

    function onDragMove(e) {
      if (!dragState) return;
      e.preventDefault();
      const x = e.clientX, y = e.clientY;
      dragState.ghost.style.left = x + 'px'; dragState.ghost.style.top = y + 'px';

      const hoverClass = dragState.dragType === 'answer' ? 'drag-over-answer' : 'drag-over-exp';
      document.querySelectorAll('.question-card').forEach(card => {
        const r = card.getBoundingClientRect();
        const isOver = x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
        if (isOver) {
          const qid = parseInt(card.dataset.qid);
          if (dragState.dragType === 'answer' && !solvedSet.has(qid)) card.classList.add(hoverClass);
          else if (dragState.dragType === 'explanation' && solvedSet.has(qid) && !expCompletedSet.has(qid)) card.classList.add(hoverClass);
        } else {
          card.classList.remove('drag-over-answer', 'drag-over-exp');
        }
      });
    }

    function onDragEnd(e) {
      if (!dragState) return;
      const x = e.clientX, y = e.clientY;
      const { chipEl, ghost, chipData, dragType, startX, startY } = dragState;
      ghost.remove();
      chipEl.classList.remove('dragging-source');
      document.querySelectorAll('.question-card').forEach(c => c.classList.remove('drag-over-answer', 'drag-over-exp'));

      const dist = Math.sqrt((x - startX) ** 2 + (y - startY) ** 2);
      if (dist < 10 && dragType === 'answer') {
        reverseLookup(chipData, chipEl);
      } else if (dist >= 10) {
        let targetCard = null;
        document.querySelectorAll('.question-card').forEach(card => {
          const r = card.getBoundingClientRect();
          if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) targetCard = card;
        });
        if (targetCard) {
          const targetQid = parseInt(targetCard.dataset.qid);
          if (dragType === 'answer') {
            if (!solvedSet.has(targetQid)) {
              const tq = questions.find(q => q.id === targetQid);
              if (chipData.text === tq.options[tq.correctIndex]) {
                solvedSet.add(targetQid);
                clearReverseLookup();
                renderAll();
                checkCompletion();
              }
            }
          } else {
            if (solvedSet.has(targetQid) && !expCompletedSet.has(targetQid)) {
              if (chipData.questionId === targetQid) {
                const placedArr = getExpPlaced(targetQid);
                if (!placedArr.includes(chipData.chipId)) {
                  placedArr.push(chipData.chipId);
                  const tq = questions.find(q => q.id === targetQid);
                  if (placedArr.length === tq.expParts.length) expCompletedSet.add(targetQid);
                  renderAll();
                  checkCompletion();
                }
              }
            }
          }
        }
      }
      document.removeEventListener('pointermove', onDragMove);
      document.removeEventListener('pointerup', onDragEnd);
      document.removeEventListener('pointercancel', onDragEnd);
      dragState = null;
    }

    // ==================== 詳解排序 ====================
    let reorderState = null;

    function onReorderStart(e) {
      e.preventDefault(); e.stopPropagation();
      const el = e.currentTarget;
      const chipId = el.dataset.chipId;
      const qid = parseInt(el.dataset.reorderQid);
      const arrIdx = parseInt(el.dataset.arrIdx);
      const chip = expChips.find(c => c.chipId === chipId);
      if (!chip) return;

      const ghost = document.createElement('div');
      ghost.className = 'drag-ghost ghost-exp';
      ghost.textContent = chip.text;
      document.body.appendChild(ghost);

      const x = e.clientX, y = e.clientY;
      ghost.style.left = x + 'px'; ghost.style.top = y + 'px';
      el.classList.add('reorder-source');
      reorderState = { sourceEl: el, ghost, chipId, qid, sourceIdx: arrIdx, startX: x, startY: y };

      document.addEventListener('pointermove', onReorderMove);
      document.addEventListener('pointerup', onReorderEnd);
      document.addEventListener('pointercancel', onReorderEnd);
    }

    function onReorderMove(e) {
      if (!reorderState) return;
      e.preventDefault();
      const x = e.clientX, y = e.clientY;
      reorderState.ghost.style.left = x + 'px'; reorderState.ghost.style.top = y + 'px';

      document.querySelectorAll('.exp-slot.insert-above, .exp-slot.insert-below').forEach(s => {
        s.classList.remove('insert-above', 'insert-below');
      });
      const expZone = document.querySelector(`.exp-zone[data-qid="${reorderState.qid}"]`);
      if (!expZone) return;
      const slots = [...expZone.querySelectorAll('.exp-slot.filled')];
      let closestSlot = null, insertPos = 'below', minDist = Infinity;
      slots.forEach(slot => {
        if (slot === reorderState.sourceEl) return;
        const r = slot.getBoundingClientRect();
        const centerY = r.top + r.height / 2;
        const d = Math.abs(y - centerY);
        if (d < minDist) { minDist = d; closestSlot = slot; insertPos = y < centerY ? 'above' : 'below'; }
      });
      if (closestSlot) closestSlot.classList.add(insertPos === 'above' ? 'insert-above' : 'insert-below');
    }

    function onReorderEnd(e) {
      if (!reorderState) return;
      const x = e.clientX, y = e.clientY;
      const { sourceEl, ghost, chipId, qid, sourceIdx, startX, startY } = reorderState;
      ghost.remove();
      sourceEl.classList.remove('reorder-source');
      document.querySelectorAll('.exp-slot.insert-above, .exp-slot.insert-below').forEach(s => {
        s.classList.remove('insert-above', 'insert-below');
      });
      const dist = Math.sqrt((x - startX) ** 2 + (y - startY) ** 2);
      if (dist >= 10) {
        const expZone = document.querySelector(`.exp-zone[data-qid="${qid}"]`);
        if (expZone) {
          const slots = [...expZone.querySelectorAll('.exp-slot.filled')];
          let closestSlot = null, insertPos = 'below', minDist = Infinity, targetIdx = sourceIdx;
          slots.forEach(slot => {
            const r = slot.getBoundingClientRect();
            const centerY = r.top + r.height / 2;
            const d = Math.abs(y - centerY);
            if (d < minDist) { minDist = d; closestSlot = slot; insertPos = y < centerY ? 'above' : 'below'; }
          });
          if (closestSlot) {
            const closestIdx = parseInt(closestSlot.dataset.arrIdx);
            targetIdx = insertPos === 'above' ? closestIdx : closestIdx + 1;
          }
          const placedArr = getExpPlaced(qid);
          if (targetIdx !== sourceIdx && targetIdx !== sourceIdx + 1) {
            const [removed] = placedArr.splice(sourceIdx, 1);
            const newIdx = targetIdx > sourceIdx ? targetIdx - 1 : targetIdx;
            placedArr.splice(newIdx, 0, removed);
            renderAll();
          }
        }
      }
      document.removeEventListener('pointermove', onReorderMove);
      document.removeEventListener('pointerup', onReorderEnd);
      document.removeEventListener('pointercancel', onReorderEnd);
      reorderState = null;
    }

    // ==================== 反向查詢 ====================
    function reverseLookup(chipData, chipEl) {
      clearReverseLookup();
      const q = questions[currentPage];
      if (!solvedSet.has(q.id) && q.options[q.correctIndex] === chipData.text) {
        document.querySelector('.question-card').classList.add('highlighted');
        chipEl.classList.add('selected');
        document.getElementById('reverseTip').classList.add('show');
      }
    }
    function clearReverseLookup() {
      document.querySelectorAll('.question-card.highlighted').forEach(c => c.classList.remove('highlighted'));
      document.querySelectorAll('.answer-chip.selected').forEach(c => c.classList.remove('selected'));
      document.getElementById('reverseTip').classList.remove('show');
    }
    document.addEventListener('pointerdown', (e) => {
      if (!e.target.closest('.answer-chip')) clearReverseLookup();
    });

    // ==================== 渲染全部 ====================
    function renderAll() {
      updateNav();
      renderCard();
      bindReorderEvents();
      renderAnswerPool();
      renderExpPool();
      renderSidebar();
    }

    // ==================== 完成 ====================
    function checkCompletion() {
      if (solvedSet.size === questions.length && expCompletedSet.size === questions.length) {
        document.getElementById('completionArea').innerHTML = `
          <div class="completion-banner">
            <div class="emoji">🎉</div>
            <h2>全部完成！答案 + 詳解都對了！</h2>
            <button class="restart-btn" onclick="restart()">再玩一次 🔄</button>
          </div>`;
      }
    }

    function restart() {
      solvedSet.clear(); expPlacedMap.clear(); expCompletedSet.clear();
      currentPage = 0;
      shuffle(answerChips); buildExpChips();
      document.getElementById('completionArea').innerHTML = '';
      dismissMonkey(); initChaosMonkey(); renderAll();
    }

    // ==================== 滑動手勢 ====================
    let swipeStartX = null;
    const mc = document.getElementById('mainContent');
    mc.addEventListener('touchstart', (e) => {
      if (e.target.closest('.answer-chip, .exp-chip, .exp-slot.filled, .nav-btn')) return;
      swipeStartX = e.touches[0].clientX;
    }, { passive: true });
    mc.addEventListener('touchend', (e) => {
      if (swipeStartX === null) return;
      const dx = e.changedTouches[0].clientX - swipeStartX;
      if (Math.abs(dx) > 60) goPage(dx < 0 ? 1 : -1);
      swipeStartX = null;
    }, { passive: true });

    // ==================== 啟動 ====================
    initChaosMonkey();
    renderAll();
  </script>
</body>
</html>
