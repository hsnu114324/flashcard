<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title> Flashcard </title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #fff;
      padding: 12px;
      overflow-x: hidden;
      touch-action: pan-y;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ===== Header ===== */
    .header { text-align: center; padding: 12px 0 8px; }
    .header h1 {
      font-size: 1.4rem; font-weight: 700;
      background: linear-gradient(90deg, #f9d423, #ff4e50);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header .subtitle { font-size: 0.8rem; color: rgba(255,255,255,0.45); margin-top: 4px; }

    /* ===== Questions Grid (2×2) ===== */
    .questions-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin: 12px 0;
    }

    .question-card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 14px 12px;
      min-height: 140px; display: flex; flex-direction: column;
      position: relative; transition: border-color 0.3s, box-shadow 0.3s;
    }
    .question-card.drag-over-answer {
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 0 15px rgba(255,255,255,0.15);
    }
    .question-card.drag-over-exp {
      border-color: rgba(147,130,255,0.6);
      box-shadow: 0 0 15px rgba(147,130,255,0.2);
    }
    .question-card.solved {
      border-color: #4cd964;
      box-shadow: 0 0 20px rgba(76,217,100,0.4), 0 0 40px rgba(76,217,100,0.15);
      animation: glowPulse 2s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(76,217,100,0.4), 0 0 40px rgba(76,217,100,0.15); }
      50%      { box-shadow: 0 0 28px rgba(76,217,100,0.6), 0 0 56px rgba(76,217,100,0.25); }
    }

    .q-number {
      display: inline-block;
      background: linear-gradient(135deg, #f9d423, #ff4e50);
      color: #1a1a2e; font-weight: 700; font-size: 0.65rem;
      padding: 2px 8px; border-radius: 10px;
      margin-bottom: 8px; align-self: flex-start;
    }
    .q-text {
      font-size: 0.82rem; line-height: 1.55; font-weight: 500;
      flex-shrink: 0; word-break: break-word;
    }
    .q-chinese-toggle {
      font-size: 0.7rem; color: rgba(255,255,255,0.45); cursor: pointer;
      margin-top: 6px; display: flex; align-items: center; gap: 4px;
    }
    .q-chinese-toggle .arrow { transition: transform 0.3s; display: inline-block; }
    .q-chinese-toggle.open .arrow { transform: rotate(90deg); }
    .q-chinese {
      font-size: 0.72rem; color: rgba(255,255,255,0.5); line-height: 1.5;
      max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease; opacity: 0;
    }
    .q-chinese.show { max-height: 60px; opacity: 1; margin-top: 4px; }

    /* ===== Answer Drop Zone ===== */
    .q-drop-zone {
      margin-top: 8px; min-height: 36px;
      border: 2px dashed rgba(255,255,255,0.2); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; color: rgba(255,255,255,0.3);
      transition: border-color 0.2s, background 0.2s;
    }
    .question-card.drag-over-answer .q-drop-zone {
      border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05);
    }
    .question-card.solved .q-drop-zone {
      border-style: solid; border-color: #4cd964;
      background: rgba(76,217,100,0.1); color: #4cd964;
      font-weight: 600; font-size: 0.78rem;
    }

    /* ===== Explanation Zone (slots inside solved cards) ===== */
    .exp-zone {
      margin-top: 8px; border-radius: 10px;
      border: 2px dashed rgba(147,130,255,0.25);
      padding: 6px; animation: fadeIn 0.4s ease;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .exp-zone-label {
      font-size: 0.6rem; font-weight: 700; color: rgba(147,130,255,0.7);
      margin-bottom: 4px;
    }
    .question-card.drag-over-exp .exp-zone {
      border-color: rgba(147,130,255,0.6); background: rgba(147,130,255,0.05);
    }
    .exp-zone.completed {
      border-style: solid; border-color: #a78bfa;
      box-shadow: 0 0 16px rgba(167,139,250,0.4), 0 0 32px rgba(167,139,250,0.15);
      animation: expGlow 2s ease-in-out infinite;
    }
    @keyframes expGlow {
      0%, 100% { box-shadow: 0 0 16px rgba(167,139,250,0.4), 0 0 32px rgba(167,139,250,0.15); }
      50%      { box-shadow: 0 0 24px rgba(167,139,250,0.6), 0 0 44px rgba(167,139,250,0.25); }
    }

    .exp-slot {
      font-size: 0.58rem; line-height: 1.4;
      padding: 4px 6px; margin: 3px 0;
      border-radius: 6px; border: 1.5px dashed rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.25); min-height: 22px;
      display: flex; align-items: center;
      transition: all 0.3s ease;
    }
    .exp-slot.filled {
      border-style: solid; border-color: rgba(167,139,250,0.35);
      background: rgba(167,139,250,0.08); color: rgba(255,255,255,0.75);
      cursor: grab; touch-action: none;
      animation: slotFill 0.4s ease;
      position: relative;
    }
    .exp-slot.filled:active { cursor: grabbing; }
    .exp-slot.filled.reorder-source { opacity: 0.3; }
    .exp-slot.insert-above {
      border-top: 2px solid #a78bfa !important;
      margin-top: 0;
    }
    .exp-slot.insert-below {
      border-bottom: 2px solid #a78bfa !important;
      margin-bottom: 0;
    }
    @keyframes slotFill {
      from { transform: scale(0.95); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== Divider ===== */
    .divider {
      text-align: center; font-size: 0.72rem;
      color: rgba(255,255,255,0.3); margin: 10px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%;
      width: 25%; height: 1px; background: rgba(255,255,255,0.1);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    /* ===== Answer Pool ===== */
    .chip-pool {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; padding: 8px 0;
    }

    .answer-chip {
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 12px; padding: 10px 14px;
      font-size: 0.82rem; font-weight: 500; color: #fff;
      cursor: grab; touch-action: none;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.3s;
      white-space: nowrap;
    }
    .answer-chip:active { cursor: grabbing; }
    .answer-chip.dragging-source { opacity: 0.3; transform: scale(0.95); }
    .answer-chip.placed { display: none; }

    /* ===== Explanation Chips (purple tint) ===== */
    .exp-chip {
      background: rgba(147,130,255,0.12);
      border: 1.5px solid rgba(147,130,255,0.25);
      border-radius: 10px; padding: 8px 12px;
      font-size: 0.72rem; font-weight: 500; color: rgba(255,255,255,0.85);
      cursor: grab; touch-action: none;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.3s;
      max-width: 100%; line-height: 1.4;
    }
    .exp-chip:active { cursor: grabbing; }
    .exp-chip.dragging-source { opacity: 0.3; transform: scale(0.95); }
    .exp-chip.placed { display: none; }

    /* ===== Highlight (reverse lookup) ===== */
    .question-card.highlighted {
      border-color: #f9d423;
      box-shadow: 0 0 18px rgba(249,212,35,0.5), 0 0 36px rgba(249,212,35,0.2);
      animation: highlightPulse 1.5s ease-in-out infinite;
    }
    @keyframes highlightPulse {
      0%, 100% { box-shadow: 0 0 18px rgba(249,212,35,0.5), 0 0 36px rgba(249,212,35,0.2); }
      50%      { box-shadow: 0 0 26px rgba(249,212,35,0.7), 0 0 50px rgba(249,212,35,0.3); }
    }
    .answer-chip.selected {
      background: rgba(249,212,35,0.25); border-color: #f9d423;
      box-shadow: 0 0 10px rgba(249,212,35,0.3);
    }
    .reverse-lookup-tip {
      text-align: center; font-size: 0.72rem; color: #f9d423;
      opacity: 0; max-height: 0; overflow: hidden; transition: all 0.3s ease;
    }
    .reverse-lookup-tip.show { opacity: 0.7; max-height: 30px; margin-bottom: 4px; }

    /* ===== Ghost (drag clone) ===== */
    .drag-ghost {
      position: fixed; z-index: 9999; pointer-events: none;
      border-radius: 12px; padding: 10px 14px;
      font-size: 0.82rem; font-weight: 600; color: #fff;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
      transform: translate(-50%, -50%) scale(1.1);
      transition: none; white-space: nowrap; max-width: 60vw;
    }
    .drag-ghost.ghost-answer {
      background: rgba(249,212,35,0.2); border: 2px solid #f9d423;
    }
    .drag-ghost.ghost-exp {
      background: rgba(147,130,255,0.25); border: 2px solid #a78bfa;
      font-size: 0.7rem; white-space: normal; line-height: 1.3;
    }

    /* ===== Chaos Monkey ===== */
    .chaos-monkey {
      cursor: pointer; font-size: 0.55rem; opacity: 0.45;
      display: inline; transition: all 0.3s ease; vertical-align: middle;
    }
    .chaos-monkey:hover { opacity: 1; transform: scale(1.4); }
    .monkey-found-banner {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      z-index: 10000; display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.3s ease;
    }
    .monkey-found-card {
      background: rgba(255,255,255,0.1); border: 2px solid #f9d423;
      border-radius: 20px; padding: 30px 24px; text-align: center; max-width: 300px;
      animation: monkeyPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes monkeyPop {
      from { transform: scale(0.3) rotate(-10deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .monkey-found-card .big-monkey { font-size: 4rem; }
    .monkey-found-card h3 {
      font-size: 1.2rem; margin: 12px 0 6px;
      background: linear-gradient(90deg, #f9d423, #ff4e50);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .monkey-found-card p { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 16px; }
    .monkey-dismiss-btn {
      padding: 10px 28px; font-size: 0.9rem; font-weight: 600; color: #1a1a2e;
      background: linear-gradient(135deg, #f9d423, #ff4e50); border: none; border-radius: 12px; cursor: pointer;
    }
    .monkey-hint-bar {
      text-align: center; font-size: 0.72rem; color: rgba(255,255,255,0.25);
      margin: 4px 0; transition: opacity 0.3s;
    }
    .monkey-hint-bar.found { color: #f9d423; opacity: 0.7; }

    /* ===== Completion ===== */
    .completion-banner { text-align: center; margin-top: 20px; animation: fadeIn 0.6s ease; }
    .completion-banner .emoji { font-size: 3rem; }
    .completion-banner h2 {
      font-size: 1.3rem; margin: 8px 0;
      background: linear-gradient(90deg, #f9d423, #ff4e50);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .restart-btn {
      margin-top: 16px; padding: 12px 32px; font-size: 0.95rem; font-weight: 600;
      color: #1a1a2e; background: linear-gradient(135deg, #f9d423, #ff4e50);
      border: none; border-radius: 14px; cursor: pointer;
    }

    .section-hidden { display: none; }
    .pool-bottom-spacer { height: 60px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Flashcard v2.0</h1>
    <div class="subtitle">把答案拖進正確的題目卡片中</div>
  </div>

  <div class="questions-grid" id="questionsGrid"></div>

  <div class="monkey-hint-bar" id="monkeyHint">🐒 Chaos Monkey 藏在某個詳解裡，找到牠！</div>
  <div class="reverse-lookup-tip" id="reverseTip">💡 點擊的答案是這些題目的正確答案</div>

  <div class="divider" id="answerDivider">⬇ 拖動答案到題目 · 點擊可反向查詢 ⬇</div>
  <div class="chip-pool" id="answerPool"></div>

  <div class="divider section-hidden" id="expDivider">⬇ 拖動詳解到已答對的題目 ⬇</div>
  <div class="chip-pool section-hidden" id="expPool"></div>

  <div class="pool-bottom-spacer"></div>
  <div id="completionArea"></div>

  <script>
    // ==================== 題庫 ====================
    const questions = [
      {
        id: 1,
        question: 'Es ______ viele alte Gemälde im Palastmuseum in Taipeh.',
        chinese: '故宮博物院裡有許多古畫。',
        options: ['haben', 'hat', 'geht', 'gibt'],
        labels: ['A', 'B', 'C', 'D'],
        correctIndex: 3,
        expParts: [
          '這是存在句型「Es gibt + Akkusativ」，意思是「有……存在於某處」。',
          '「Es」是形式主語，「gibt」是 geben 第三人稱。後面永遠接第四格。',
          '🎤 導遊應用：「Im Palastmuseum gibt es mehr als 700.000 Kunstwerke.」',
          '❌ haben/hat 是「擁有」不符存在句；geht 是「進行」不能表存在。',
          '💡 口訣：Es _ viele... im/in/am... → 99% 是 gibt！'
        ]
      },
      {
        id: 2,
        question: 'Ich unterhalte ______ gern mit Ausländern.',
        chinese: '我很喜歡跟外國人聊天。',
        options: ['mich', 'sich', 'ihn', 'uns'],
        labels: ['A', 'B', 'C', 'D'],
        correctIndex: 0,
        expParts: [
          'sich unterhalten 是反身動詞，意思是「聊天、交談」。',
          '第一人稱反身代詞用 mich。主語與受詞同一人 → 加反身代詞。',
          '🎤「Ich unterhalte mich gern mit Touristen über die Geschichte Taiwans.」',
          '❌ sich 用於第三人稱；ihn 是「他」的第四格；uns 是「我們」。',
          '💡 口訣：我 mich、你 dich、他 sich、我們 uns。'
        ]
      },
      {
        id: 3,
        question: 'Ich glaube, es hat ______.',
        chinese: '我覺得門鈴響了／電話響了。',
        options: ['geklungen', 'geklingelt', 'gelungen', 'klingen'],
        labels: ['A', 'B', 'C', 'D'],
        correctIndex: 1,
        expParts: [
          '完成式（Perfekt）結構：es hat + Partizip II。',
          'klingeln（鈴響）→ 過去分詞 geklingelt（規則動詞，加 ge-，-t）。',
          '❌ geklungen 是 klingen；gelungen 是 gelingen；klingen 是原形。',
          '🎤「Es hat geklingelt. Vielleicht ist der Bus schon da.」'
        ]
      },
      {
        id: 4,
        question: 'Herr Meier ______ gestern von Frankfurt nach Hongkong.',
        chinese: '梅爾先生昨天從法蘭克福飛到香港。',
        options: ['flog', 'fliegte', 'fliegt', 'flug'],
        labels: ['A', 'B', 'C', 'D'],
        correctIndex: 0,
        expParts: [
          'fliegen 是強變化不規則動詞，過去式（Präteritum）是 flog。',
          '變化表：fliegen – flog – ist geflogen。gestern → 用過去式。',
          '❌ fliegte 是錯誤弱變化；fliegt 是現在式；flug 不存在。',
          '💡 常考：fliegen-flog、gehen-ging、sehen-sah、kommen-kam。'
        ]
      }
    ];

    // ==================== 產生答案卡片 ====================
    let answerChips = [];
    questions.forEach(q => {
      q.options.forEach((opt, i) => {
        answerChips.push({
          chipId: `ans-q${q.id}-${i}`,
          type: 'answer',
          questionId: q.id,
          label: q.labels[i],
          text: opt,
          isCorrect: i === q.correctIndex
        });
      });
    });

    // ==================== 產生詳解卡片 ====================
    let expChips = [];
    function buildExpChips() {
      expChips = [];
      questions.forEach(q => {
        q.expParts.forEach((part, i) => {
          expChips.push({
            chipId: `exp-q${q.id}-${i}`,
            type: 'explanation',
            questionId: q.id,
            partIndex: i,
            text: part
          });
        });
      });
      shuffle(expChips);
    }

    // 洗牌
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    shuffle(answerChips);
    buildExpChips();

    // ==================== 狀態 ====================
    let solvedSet = new Set();           // 已答對的題目 ID
    let expPlacedMap = new Map();        // qid → chipId[]（有序陣列，最新在前）
    let expCompletedSet = new Set();     // 詳解全部填滿的題目 ID

    function getExpPlaced(qid) {
      if (!expPlacedMap.has(qid)) expPlacedMap.set(qid, []);
      return expPlacedMap.get(qid);
    }

    // ==================== Chaos Monkey ====================
    let monkeyQuestionId = null;
    let monkeyPartIndex = null;
    let monkeyFound = false;

    function initChaosMonkey() {
      const q = questions[Math.floor(Math.random() * questions.length)];
      monkeyQuestionId = q.id;
      monkeyPartIndex = Math.floor(Math.random() * q.expParts.length);
      monkeyFound = false;
      updateMonkeyHint();
    }

    function getExpText(qid, partIndex, text) {
      if (qid === monkeyQuestionId && partIndex === monkeyPartIndex && !monkeyFound) {
        const pos = Math.floor(text.length / 2);
        return text.slice(0, pos) + '<span class="chaos-monkey" onclick="foundMonkey(event)">🐒</span>' + text.slice(pos);
      }
      return text;
    }

    function foundMonkey(e) {
      e.stopPropagation();
      if (monkeyFound) return;
      monkeyFound = true;
      updateMonkeyHint();
      const banner = document.createElement('div');
      banner.className = 'monkey-found-banner';
      banner.id = 'monkeyBanner';
      banner.innerHTML = `
        <div class="monkey-found-card">
          <div class="big-monkey">🐒</div>
          <h3>你找到 Chaos Monkey 了！</h3>
          <p>牠藏在第 ${monkeyQuestionId} 題的詳解裡</p>
          <button class="monkey-dismiss-btn" onclick="dismissMonkey()">知道了 👍</button>
        </div>`;
      document.body.appendChild(banner);
    }
    function dismissMonkey() {
      const b = document.getElementById('monkeyBanner');
      if (b) b.remove();
    }
    function updateMonkeyHint() {
      const h = document.getElementById('monkeyHint');
      if (!h) return;
      if (monkeyFound) { h.textContent = '🐒 Chaos Monkey 已被你抓到了！'; h.classList.add('found'); }
      else { h.textContent = '🐒 Chaos Monkey 藏在某個詳解裡，找到牠！'; h.classList.remove('found'); }
    }

    // ==================== 渲染：題目卡片 ====================
    function renderQuestions() {
      const grid = document.getElementById('questionsGrid');
      grid.innerHTML = questions.map(q => {
        const isSolved = solvedSet.has(q.id);
        const placedArr = getExpPlaced(q.id);
        const expDone = expCompletedSet.has(q.id);
        const totalParts = q.expParts.length;
        const filledCount = placedArr.length;
        const emptyCount = totalParts - filledCount;

        let expZoneHtml = '';
        if (isSolved) {
          // 已放入的 chip：最新的在最上方（Kanban 堆疊）
          const filledHtml = placedArr.map((chipId, arrIdx) => {
            const chip = expChips.find(c => c.chipId === chipId);
            if (!chip) return '';
            const displayText = getExpText(q.id, chip.partIndex, chip.text);
            return `<div class="exp-slot filled" data-chip-id="${chipId}" data-reorder-qid="${q.id}" data-arr-idx="${arrIdx}">${displayText}</div>`;
          }).join('');

          // 未填的空槽在下方
          let emptyHtml = '';
          for (let i = 0; i < emptyCount; i++) {
            emptyHtml += `<div class="exp-slot"><span style="opacity:0.35">⬜</span></div>`;
          }

          expZoneHtml = `
            <div class="exp-zone ${expDone ? 'completed' : ''}" data-qid="${q.id}">
              <div class="exp-zone-label">📖 詳解 (${filledCount}/${totalParts})</div>
              ${filledHtml}${emptyHtml}
            </div>`;
        }

        return `
          <div class="question-card ${isSolved ? 'solved' : ''}" data-qid="${q.id}">
            <span class="q-number">第 ${q.id} 題</span>
            <div class="q-text">${q.question}</div>
            <div class="q-chinese-toggle" onclick="toggleCh(this, ${q.id})">
              <span class="arrow">▶</span> 中文翻譯
            </div>
            <div class="q-chinese" id="ch-${q.id}">${q.chinese}</div>
            <div class="q-drop-zone" id="dz-${q.id}">
              ${isSolved ? `(${q.labels[q.correctIndex]}) ${q.options[q.correctIndex]}` : '將答案拖到這裡'}
            </div>
            ${expZoneHtml}
          </div>`;
      }).join('');
    }

    // 綁定已填入的詳解 slot 拖動排序事件
    function bindReorderEvents() {
      document.querySelectorAll('.exp-slot.filled[data-chip-id]').forEach(el => {
        el.addEventListener('pointerdown', onReorderStart);
      });
    }

    // ==================== 詳解排序拖放 ====================
    let reorderState = null;

    function onReorderStart(e) {
      e.preventDefault();
      e.stopPropagation();
      const el = e.currentTarget;
      const chipId = el.dataset.chipId;
      const qid = parseInt(el.dataset.reorderQid);
      const arrIdx = parseInt(el.dataset.arrIdx);

      const chip = expChips.find(c => c.chipId === chipId);
      if (!chip) return;

      // 建立 ghost
      const ghost = document.createElement('div');
      ghost.className = 'drag-ghost ghost-exp';
      ghost.textContent = chip.text;
      document.body.appendChild(ghost);

      const x = e.clientX, y = e.clientY;
      ghost.style.left = x + 'px';
      ghost.style.top = y + 'px';
      el.classList.add('reorder-source');

      reorderState = { sourceEl: el, ghost, chipId, qid, sourceIdx: arrIdx, startX: x, startY: y };

      document.addEventListener('pointermove', onReorderMove);
      document.addEventListener('pointerup', onReorderEnd);
      document.addEventListener('pointercancel', onReorderEnd);
    }

    function onReorderMove(e) {
      if (!reorderState) return;
      e.preventDefault();
      const x = e.clientX, y = e.clientY;
      reorderState.ghost.style.left = x + 'px';
      reorderState.ghost.style.top = y + 'px';

      // 清除所有 indicator
      document.querySelectorAll('.exp-slot.insert-above, .exp-slot.insert-below').forEach(s => {
        s.classList.remove('insert-above', 'insert-below');
      });

      // 找到同題目的 exp-zone 裡的 filled slots
      const expZone = document.querySelector(`.exp-zone[data-qid="${reorderState.qid}"]`);
      if (!expZone) return;

      const slots = [...expZone.querySelectorAll('.exp-slot.filled')];
      let closestSlot = null;
      let insertPos = 'below'; // 'above' or 'below'
      let minDist = Infinity;

      slots.forEach(slot => {
        if (slot === reorderState.sourceEl) return;
        const r = slot.getBoundingClientRect();
        const centerY = r.top + r.height / 2;
        const dist = Math.abs(y - centerY);
        if (dist < minDist) {
          minDist = dist;
          closestSlot = slot;
          insertPos = y < centerY ? 'above' : 'below';
        }
      });

      if (closestSlot) {
        closestSlot.classList.add(insertPos === 'above' ? 'insert-above' : 'insert-below');
      }
    }

    function onReorderEnd(e) {
      if (!reorderState) return;
      const x = e.clientX, y = e.clientY;
      const { sourceEl, ghost, chipId, qid, sourceIdx, startX, startY } = reorderState;

      ghost.remove();
      sourceEl.classList.remove('reorder-source');

      // 清除 indicator
      document.querySelectorAll('.exp-slot.insert-above, .exp-slot.insert-below').forEach(s => {
        s.classList.remove('insert-above', 'insert-below');
      });

      const dist = Math.sqrt((x - startX) ** 2 + (y - startY) ** 2);

      if (dist >= 10) {
        // 計算目標位置
        const expZone = document.querySelector(`.exp-zone[data-qid="${qid}"]`);
        if (expZone) {
          const slots = [...expZone.querySelectorAll('.exp-slot.filled')];
          let targetIdx = sourceIdx; // 預設不動

          let closestSlot = null;
          let insertPos = 'below';
          let minDist = Infinity;

          slots.forEach(slot => {
            const r = slot.getBoundingClientRect();
            const centerY = r.top + r.height / 2;
            const d = Math.abs(y - centerY);
            if (d < minDist) {
              minDist = d;
              closestSlot = slot;
              insertPos = y < centerY ? 'above' : 'below';
            }
          });

          if (closestSlot) {
            const closestIdx = parseInt(closestSlot.dataset.arrIdx);
            if (insertPos === 'above') {
              targetIdx = closestIdx;
            } else {
              targetIdx = closestIdx + 1;
            }
          }

          // 執行重排
          const placedArr = getExpPlaced(qid);
          if (targetIdx !== sourceIdx && targetIdx !== sourceIdx + 1) {
            // 先移除
            const [removed] = placedArr.splice(sourceIdx, 1);
            // 計算新位置（因為移除後 index 可能偏移）
            const newIdx = targetIdx > sourceIdx ? targetIdx - 1 : targetIdx;
            placedArr.splice(newIdx, 0, removed);
            renderAll();
          }
        }
      }

      document.removeEventListener('pointermove', onReorderMove);
      document.removeEventListener('pointerup', onReorderEnd);
      document.removeEventListener('pointercancel', onReorderEnd);
      reorderState = null;
    }

    // ==================== 渲染：答案池 ====================
    function renderAnswerPool() {
      const pool = document.getElementById('answerPool');
      pool.innerHTML = answerChips.map(chip => {
        const isPlaced = solvedSet.has(chip.questionId) && chip.isCorrect;
        return `<div class="answer-chip ${isPlaced ? 'placed' : ''}"
                     data-chip-id="${chip.chipId}" data-drag-type="answer">
                  (${chip.label}) ${chip.text}
                </div>`;
      }).join('');

      pool.querySelectorAll('.answer-chip:not(.placed)').forEach(el => {
        el.addEventListener('pointerdown', onDragStart);
      });
    }

    // ==================== 渲染：詳解池 ====================
    function renderExpPool() {
      const divider = document.getElementById('expDivider');
      const pool = document.getElementById('expPool');

      // 只顯示已答對題目的詳解 chip
      const visibleChips = expChips.filter(c => solvedSet.has(c.questionId));
      if (visibleChips.length === 0) {
        divider.classList.add('section-hidden');
        pool.classList.add('section-hidden');
        return;
      }

      divider.classList.remove('section-hidden');
      pool.classList.remove('section-hidden');

      pool.innerHTML = visibleChips.map(chip => {
        const placedArr = getExpPlaced(chip.questionId);
        const isPlaced = placedArr.includes(chip.chipId);
        return `<div class="exp-chip ${isPlaced ? 'placed' : ''}"
                     data-chip-id="${chip.chipId}" data-drag-type="explanation">
                  ${chip.text}
                </div>`;
      }).join('');

      pool.querySelectorAll('.exp-chip:not(.placed)').forEach(el => {
        el.addEventListener('pointerdown', onDragStart);
      });
    }

    // ==================== 中文翻譯 ====================
    function toggleCh(btn, qid) {
      btn.classList.toggle('open');
      document.getElementById(`ch-${qid}`).classList.toggle('show');
    }

    // ==================== 統一拖放系統 ====================
    let dragState = null;

    function onDragStart(e) {
      e.preventDefault();
      const el = e.currentTarget;
      const chipId = el.dataset.chipId;
      const dragType = el.dataset.dragType; // 'answer' or 'explanation'

      let chipData;
      if (dragType === 'answer') {
        chipData = answerChips.find(c => c.chipId === chipId);
      } else {
        chipData = expChips.find(c => c.chipId === chipId);
      }
      if (!chipData) return;

      const ghost = document.createElement('div');
      ghost.className = `drag-ghost ${dragType === 'answer' ? 'ghost-answer' : 'ghost-exp'}`;
      ghost.textContent = dragType === 'answer' ? `(${chipData.label}) ${chipData.text}` : chipData.text;
      document.body.appendChild(ghost);

      const x = e.clientX, y = e.clientY;
      ghost.style.left = x + 'px';
      ghost.style.top = y + 'px';
      el.classList.add('dragging-source');

      dragState = { chipEl: el, ghost, chipData, dragType, startX: x, startY: y };

      document.addEventListener('pointermove', onDragMove);
      document.addEventListener('pointerup', onDragEnd);
      document.addEventListener('pointercancel', onDragEnd);
    }

    function onDragMove(e) {
      if (!dragState) return;
      e.preventDefault();
      const x = e.clientX, y = e.clientY;
      dragState.ghost.style.left = x + 'px';
      dragState.ghost.style.top = y + 'px';

      const hoverClass = dragState.dragType === 'answer' ? 'drag-over-answer' : 'drag-over-exp';
      document.querySelectorAll('.question-card').forEach(card => {
        const r = card.getBoundingClientRect();
        const isOver = x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
        if (isOver) {
          const qid = parseInt(card.dataset.qid);
          if (dragState.dragType === 'answer' && !solvedSet.has(qid)) {
            card.classList.add(hoverClass);
          } else if (dragState.dragType === 'explanation' && solvedSet.has(qid) && !expCompletedSet.has(qid)) {
            card.classList.add(hoverClass);
          }
        } else {
          card.classList.remove('drag-over-answer', 'drag-over-exp');
        }
      });
    }

    function onDragEnd(e) {
      if (!dragState) return;
      const x = e.clientX, y = e.clientY;
      const { chipEl, ghost, chipData, dragType, startX, startY } = dragState;

      ghost.remove();
      chipEl.classList.remove('dragging-source');
      document.querySelectorAll('.question-card').forEach(c => c.classList.remove('drag-over-answer', 'drag-over-exp'));

      const dist = Math.sqrt((x - startX) ** 2 + (y - startY) ** 2);

      if (dist < 10 && dragType === 'answer') {
        // 短按 → 反向查詢（只對答案 chip）
        reverseLookup(chipData, chipEl);
      } else if (dist >= 10) {
        // 拖動 → 嘗試放置
        let targetCard = null;
        document.querySelectorAll('.question-card').forEach(card => {
          const r = card.getBoundingClientRect();
          if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) {
            targetCard = card;
          }
        });

        if (targetCard) {
          const targetQid = parseInt(targetCard.dataset.qid);

          if (dragType === 'answer') {
            // 答案拖放
            if (!solvedSet.has(targetQid)) {
              const tq = questions.find(q => q.id === targetQid);
              if (chipData.text === tq.options[tq.correctIndex]) {
                solvedSet.add(targetQid);
                clearReverseLookup();
                renderAll();
                checkCompletion();
              }
            }
          } else {
            // 詳解拖放
            if (solvedSet.has(targetQid) && !expCompletedSet.has(targetQid)) {
              if (chipData.questionId === targetQid) {
                const placedArr = getExpPlaced(targetQid);
                if (!placedArr.includes(chipData.chipId)) {
                  // Kanban 堆疊：最新的插入最前面（最上方）
                  placedArr.unshift(chipData.chipId);
                  // 檢查是否全部填滿
                  const tq = questions.find(q => q.id === targetQid);
                  if (placedArr.length === tq.expParts.length) {
                    expCompletedSet.add(targetQid);
                  }
                  renderAll();
                  checkCompletion();
                }
              }
            }
          }
        }
      }

      document.removeEventListener('pointermove', onDragMove);
      document.removeEventListener('pointerup', onDragEnd);
      document.removeEventListener('pointercancel', onDragEnd);
      dragState = null;
    }

    // ==================== 反向查詢 ====================
    function reverseLookup(chipData, chipEl) {
      clearReverseLookup();
      const matchingQids = questions
        .filter(q => !solvedSet.has(q.id) && q.options[q.correctIndex] === chipData.text)
        .map(q => q.id);
      if (matchingQids.length > 0) {
        matchingQids.forEach(qid => {
          const card = document.querySelector(`.question-card[data-qid="${qid}"]`);
          if (card) card.classList.add('highlighted');
        });
        chipEl.classList.add('selected');
        document.getElementById('reverseTip').classList.add('show');
      }
    }
    function clearReverseLookup() {
      document.querySelectorAll('.question-card.highlighted').forEach(c => c.classList.remove('highlighted'));
      document.querySelectorAll('.answer-chip.selected').forEach(c => c.classList.remove('selected'));
      document.getElementById('reverseTip').classList.remove('show');
    }
    document.addEventListener('pointerdown', (e) => {
      if (!e.target.closest('.answer-chip')) clearReverseLookup();
    });

    // ==================== 渲染全部 ====================
    function renderAll() {
      renderQuestions();
      bindReorderEvents();
      renderAnswerPool();
      renderExpPool();
    }

    // ==================== 完成判斷 ====================
    function checkCompletion() {
      const allAnswered = solvedSet.size === questions.length;
      const allExplained = expCompletedSet.size === questions.length;
      if (allAnswered && allExplained) {
        document.getElementById('completionArea').innerHTML = `
          <div class="completion-banner">
            <div class="emoji">🎉</div>
            <h2>全部完成！答案 + 詳解都對了！</h2>
            <button class="restart-btn" onclick="restart()">再玩一次 🔄</button>
          </div>`;
      }
    }

    function restart() {
      solvedSet.clear();
      expPlacedMap.clear();
      expCompletedSet.clear();
      shuffle(answerChips);
      buildExpChips();
      document.getElementById('completionArea').innerHTML = '';
      dismissMonkey();
      initChaosMonkey();
      renderAll();
    }

    // ==================== 啟動 ====================
    initChaosMonkey();
    renderAll();
  </script>
</body>
</html>
